    // browser tab to isolate: if that also fails, it's a deployment/

// Week of month — Monday-based, SINGLE canonical definition used everywhere
const getWeekOfMonth = dateStr => {
  const d = new Date(dateStr);
  if (isNaN(d)) return 1;
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
  return Math.floor((d.getDate() + startDay - 1) / 7) + 1;
};
const weekLabel = (w, year, month, loc) => {
  const monthStart = new Date(year, month, 1);
  const startDay   = monthStart.getDay() === 0 ? 6 : monthStart.getDay() - 1;
  const wkStart    = new Date(year, month, 1 + (w - 1) * 7 - startDay);
  const wkEnd      = new Date(wkStart); wkEnd.setDate(wkStart.getDate() + 6);
  const f2 = d => d.toLocaleDateString(loc==="en"?"en-GB":"id-ID", { day:"2-digit", month:"short" });
  return `${f2(wkStart)} – ${f2(wkEnd)}`;
};

const weeksInMonth = (year, month) => {
  const first = new Date(year, month, 1);
  const last  = new Date(year, month+1, 0);
  const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
  return Math.ceil((last.getDate() + startDay) / 7);

  const monthStart = new Date(year, month, 1);
  const startDay   = monthStart.getDay() === 0 ? 6 : monthStart.getDay() - 1;
  const wkStart    = new Date(year, month, 1 + (w - 1) * 7 - startDay);
  return wkStart.toISOString().slice(0,10);
};

// Build real notifications from live data — vehicle docs + Dana Operasional gap only (no fuel).
const buildNotifs = (vehicles, kantong, T) => {
  const out = [];

  (vehicles||[]).forEach(v => {
    [[T.docKir, v.kir], [T.docService, v.service], [T.docStnk, v.stnk]].forEach(([label, date]) => {
      const days = daysUntil(date);
      if (days <= 30) {
        out.push({
          id: `doc-${v.id}-${label}`,
          type: days <= 7 ? "warning" : "info",
          title: `${label} ${days <= 0 ? T.notifOverdue : T.notifReminder} — ${v.plate}`,
          msg: days <= 0
            ? T.notifDocOverdueMsg(label, v.type||"", v.plate, fmtDate(date,T.lang))
            : T.notifDocDueMsg(label, v.type||"", v.plate, days, fmtDate(date,T.lang)),
          sortKey: days,
        });
      }
    });
  });

  if (kantong) {
    const totalAlokasi = (kantong.allocOpDriver||0) + (kantong.allocEmergency||0);
    const outstanding  = totalAlokasi + (kantong.cashAvailable||0) + (kantong.claimSubmitted||0) + (kantong.claimPaid||0);
    const gap = outstanding - (kantong.totalBudget||0);

        id: "opfund-gap-over",
        type: "warning",
        title: T.notifGapOverTitle,
        msg: T.notifGapOverMsg(fmt(gap)),
        sortKey: -2,
      });
    } else if (gap < 0) {
      out.push({
        id: "opfund-gap-under",
        type: "info",
        title: T.notifGapUnderTitle,
        msg: T.notifGapUnderMsg(fmt(Math.abs(gap))),
        sortKey: -1,
      });
    }
  }

  return out.sort((a,b) => a.sortKey - b.sortKey).map(n => ({ ...n, read:false }));
};

// ─── PDF EXPORT HELPER (jsPDF + autoTable, fleet-style landscape) ───────────
// Shared header/footer/stat-card drawing used by both Claim and Cashflow PDFs.
function makeFleetPDF(opts) {
  const JsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if (!JsPDF) { return null; }
  const doc = new JsPDF({ orientation:"landscape", unit:"mm", format:"a4" });
  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();
  const ML = 14, MR = 14;
  const CW = PW - ML - MR;
  let Y = 0;

  // Color tokens sampled directly from the reference Canteen Operations PDF —
  // kept identical here so every report in the suite shares one visual system.
  const C = {
    navy:    [10,20,51],     // header/footer band
    blue:    [58,91,219],    // primary accent: period bar, section label, default stat bar
    green:   [22,163,73],
    orange:  [234,89,12],
    purple:  [109,40,216],
    red:     [214,52,52],
    white:   [255,255,255],
    txt1:    [13,19,40],     // value numbers, section label text — near-black
    label:   [84,99,145],    // stat card small labels (ORDERED/CONSUMED/...) — same on every card regardless of accent color
    txt3:    [110,120,150],  // muted meta text (subtitles, sub-labels, footer)
    headerSub:[150,165,200], // header subtitle / meta lines on navy bg
    periodBg:[234,239,255],  // period bar background tint
    border:  [206,211,227],
    bg:      [255,255,255],  // page background is plain white, not off-white
  };

  function sf(rgb){ doc.setFillColor(rgb[0],rgb[1],rgb[2]); }
  function sd(rgb){ doc.setDrawColor(rgb[0],rgb[1],rgb[2]); }
  function st(rgb){ doc.setTextColor(rgb[0],rgb[1],rgb[2]); }

  function drawPageHeader() {
    // Single full-bleed navy band — no separate logo box, no accent stripe
    // beneath it. The body content starts directly below in white.
    sf(C.navy); doc.rect(0,0,PW,24,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(15); st(C.white);
    doc.text(opts.title || 'LAPORAN', ML, 11);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); st(C.headerSub);
    doc.text(opts.subtitle || '', ML, 17.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); st(C.white);
    doc.text(opts.metaRight1 || '', PW-MR, 10, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); st(C.headerSub);
    doc.text(opts.metaRight2 || '', PW-MR, 16, {align:'right'});
    Y = 32;
  }

  function drawPageFooter() {
    const fy = PH - 9;
    sf(C.navy); doc.rect(0,fy-2,PW,11,'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(7); st(C.headerSub);
    doc.text(opts.footerLeft || '', ML, fy+3.5);
    doc.text((opts.pageLabel||'Halaman')+' '+doc.internal.getNumberOfPages(), PW-MR, fy+3.5, {align:'right'});
  }

  function needY(h) { if (Y + h > PH - 14) { doc.addPage(); drawPageHeader(); } }

  // Section label: bold near-black text in sentence case (NOT uppercase),
  // thick short vertical accent bar to its left, thin rule continuing to
  // the right edge of the content area.
  function secLbl(label) {
    needY(13);
    sf(C.blue); doc.rect(ML, Y, 1.4, 5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); st(C.txt1);
    doc.text(label, ML+4.5, Y+4.2);
    sd(C.border); doc.setLineWidth(0.3);
    doc.line(ML+4.5+doc.getTextWidth(label)+4, Y+2.2, PW-MR, Y+2.2);
    Y += 11;
  }

  // Stat cards: white bg, thick solid accent bar on top (color varies per
  // card), label text always the same neutral blue-grey regardless of the
  // accent color, value always near-black bold — never colored.
  function drawStatCards(cards, colors) {
    needY(26);
    const gap = 4.5;
    const w = (CW - gap*(cards.length-1)) / cards.length;
    const h = 22;
    cards.forEach((c,i) => {
      const x = ML + i*(w+gap);
      sf(C.white); sd(C.border); doc.setLineWidth(0.25);
      doc.roundedRect(x, Y, w, h, 1.6, 1.6, 'FD');
      const col = colors[i] || C.blue;
      sf(col); doc.roundedRect(x, Y, w, 3.2, 1.6, 1.6, 'F');
      doc.rect(x, Y+1.6, w, 1.6, 'F'); // square off the bottom of the accent bar so it doesn't bleed rounded corners into the card body
      doc.setFont('helvetica','bold'); doc.setFontSize(6.8); st(C.label);
      doc.text(String(c.lbl).toUpperCase(), x+4.5, Y+9.5);
      doc.setFont('helvetica','bold'); doc.setFontSize(15); st(C.txt1);
      doc.text(String(c.val), x+4.5, Y+16.5);
      if (c.sub) { doc.setFont('helvetica','normal'); doc.setFontSize(6.8); st(C.txt3); doc.text(String(c.sub), x+4.5, Y+20); }
    });
    Y += h + 6;
  }

  // Period bar: light blue tint background, solid blue block on the left
  // edge, "PERIOD" label in blue, value in dark text, optional right-aligned
  // meta note in muted grey.
  function periodBar(label, sub, periodWord) {
    needY(14);
    const h = 11;
    sf(C.periodBg); sd([191,205,247]); doc.setLineWidth(0.25);
    doc.roundedRect(ML, Y, CW, h, 1.6, 1.6, 'FD');
    sf(C.blue); doc.rect(ML, Y, 4, h, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); st(C.blue);
    doc.text((periodWord||'PERIOD'), ML+8, Y+h/2+1);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); st(C.txt1);
    doc.text(String(label), ML+32, Y+h/2+1);
    if (sub) { doc.setFont('helvetica','normal'); doc.setFontSize(7.5); st(C.txt3); doc.text(String(sub), PW-MR-3, Y+h/2+1, {align:'right'}); }
    Y += h + 5;
  }

  return { doc, C, PW, PH, ML, MR, CW, get Y(){return Y;}, set Y(v){Y=v;},
    drawPageHeader, drawPageFooter, needY, secLbl, drawStatCards, periodBar, sf, sd, st };
}

function Claims({claims,setClaims,drivers,showToast,gasReady}) {
  const {lang,T} = useLang();
  const today = new Date().toISOString().slice(0,10);
  const now   = new Date();
  const blankItem = () => ({id:Date.now()+Math.random(),type:"Gasoline",expr:""});
  const blankForm = () => ({
    driver:"", submissionDate: today,
    periodYear: now.getFullYear(), periodMonth: now.getMonth(), periodWeek: getWeekOfMonth(today),
    items:[blankItem()], note:"",
  });
  const [show,setShow]           = useState(false);
  const [form,setForm]           = useState(blankForm);
  const [fDriver,setFDriver]     = useState("all");
  const [submitting,setSubmitting] = useState(false);
  const [expanded,setExpanded]   = useState({});
  const [confirmDel,setConfirmDel] = useState(null);
  const togExpand = id => setExpanded(p=>({...p,[id]:!p[id]}));
  const addItem    = () => setForm(p=>({...p,items:[...p.items,blankItem()]}));
  const removeItem = id => setForm(p=>({...p,items:p.items.filter(x=>x.id!==id)}));
  const updateItem = (id,field,val) => setForm(p=>({...p,items:p.items.map(x=>x.id===id?{...x,[field]:val}:x)}));
  const itemTotal  = item => evalExpr(item.expr)||0;
  const grandTotal = form.items.reduce((s,item)=>s+itemTotal(item),0);
  const allValid   = form.items.length>0&&form.items.every(i=>i.type&&itemTotal(i)>0);
  const canSave    = form.driver&&form.submissionDate&&allValid;
  const allDrivers = [...new Set(claims.map(c=>getClaimDriver(c)).filter(Boolean))];
  const filtered   = claims.filter(c=>{
    const d = getClaimDriver(c);
    return fDriver==="all"||d===fDriver;
  });
  const driverList = drivers&&drivers.length>0 ? drivers.map(d=>typeof d==="string"?d:d.name).filter(Boolean) : DRIVERS;

  // Week-picker helpers, bound to the currently selected month/year in the form
  const wCount = weeksInMonth(form.periodYear, form.periodMonth);
  const periodDateISO = weekMondayISO(form.periodYear, form.periodMonth, Math.min(form.periodWeek, wCount));
  const periodRangeLabel = weekLabel(Math.min(form.periodWeek, wCount), form.periodYear, form.periodMonth, lang);

  const save = async () => {
    if (!canSave||submitting) return;
    setSubmitting(true);
    const driverObj   = (drivers||[]).find(d=>(d.name||d)===form.driver);
    const driverEmail = driverObj&&typeof driverObj==="object"&&driverObj.email ? driverObj.email.trim():"";
    const submittedAt = new Date().toISOString();
    const id = "CLM-"+Date.now();
    const itemsData   = form.items.map(item=>({type:item.type,expr:item.expr,total:itemTotal(item)}));
    const wClamped = Math.min(form.periodWeek, wCount);
    const periodDate = weekMondayISO(form.periodYear, form.periodMonth, wClamped);
    const newClaim = {
      id, driver:form.driver, driverName:form.driver, driverEmail,

      types:[...new Set(itemsData.map(i=>i.type))].join(","), items:itemsData, total:grandTotal,
      status:"submitted", note:form.note||"", submittedAt,
    };
    setClaims(p=>[...p,newClaim]); setShow(false); setForm(blankForm()); showToast(T.claimSubmittedTxt);
    if (gasReady) await gasCall("addClaim",{id,driverName:form.driver,driverEmail,submissionDate:form.submissionDate,date:periodDate,periodDate,note:form.note||"",submittedAt,items:itemsData,grandTotal});
    setSubmitting(false);
  };
  const del = async id => {
    const updated = claims.filter(c=>c.id!==id); setClaims(updated); showToast(T.delete,"error"); setConfirmDel(null);
    if (gasReady) await gasCall("deleteClaim",{id}); else syncToGAS("saveClaims",{claims:updated});

        React.createElement("option",{value:"all"},T.allDrivers),
        allDrivers.map(d=>React.createElement("option",{key:d,value:d},d))
      ),
      React.createElement("div",{style:{flex:1}}),
      React.createElement("button",{className:"btn btn-p",onClick:()=>{setForm(blankForm());setShow(true);}},

// POM BENSIN — shared stats + sketch helpers (used by both the inline
// infographic and the PDF export, so the numbers always match exactly)
// ═══════════════════════════════════════════════════════════
function computeFuelStats(stations) {
  const total = stations.length;

  // Per-fuel availability count
  const fuelCounts = FUEL_TYPES_LIST.map(type => {
    const count = stations.filter(s => (s.fuels||[]).some(f => f.type===type && f.available)).length;
    return { type, count, pct: total>0 ? (count/total*100) : 0 };
  }).sort((a,b) => b.count - a.count);

  const uniqueFuelTypesAvailable = fuelCounts.filter(f => f.count > 0).length;
  const avgFuelsPerStation = total>0
    ? stations.reduce((s,st) => s + (st.fuels||[]).filter(f=>f.available).length, 0) / total
    : 0;
  const noDataCount = stations.filter(s => !(s.fuels||[]).length || (s.fuels||[]).every(f=>!f.available)).length;

  // Data completeness: a station counts as "filled in" per fuel type if
  // that type appears in its fuels array at all (true or false — meaning
  // the user has actually reviewed/toggled it), not just default state.
  let complete = 0, partial = 0, empty = 0;
  stations.forEach(s => {
    const filledCount = (s.fuels||[]).length;
    if (filledCount === 0) empty++;
    else if (filledCount >= FUEL_TYPES_LIST.length) complete++;
    else partial++;
  });

  // Monthly trend from createdAt, last 6 months that have any data
  const monthMap = {};
  stations.forEach(s => {
    if (!s.createdAt) return;
    const d = new Date(s.createdAt);
    if (isNaN(d)) return;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthMap[key] = (monthMap[key]||0) + 1;
  });
  const trend = Object.entries(monthMap).sort((a,b)=>a[0]<b[0]?-1:1).slice(-6).map(([key,count]) => {
    const [y,m] = key.split('-');
    return { key, label: MONTHS[parseInt(m)-1].slice(0,3)+' '+y.slice(2), count };
  });

  return { total, fuelCounts, uniqueFuelTypesAvailable, avgFuelsPerStation, noDataCount, complete, partial, empty, trend };
}

// Renders a dependency-free location sketch (NOT a real map tile screenshot
// — deliberately avoided due to cross-origin tile loading risks inside a
// PDF export pipeline). Plots each station's lat/lng proportionally inside
// a canvas with a reference grid, north arrow, and numbered pins, returning
// a PNG data URL ready for jsPDF's addImage().
function drawStationSketch(stations, opts) {
  const W = (opts && opts.width)  || 900;
  const H = (opts && opts.height) || 620;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, W, H);

  const pad = 60;
  const plotW = W - pad*2;
  const plotH = H - pad*2 - 40; // leave room for scale bar at bottom

  const valid = stations.filter(s => isFinite(s.lat) && isFinite(s.lng));
  if (valid.length === 0) {
    ctx.fillStyle = '#94A3B8';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText((opts&&opts.emptyMsg) || 'Belum ada titik SPBU untuk ditampilkan', W/2, H/2);
    return canvas.toDataURL('image/png');
  }

  let minLat = Math.min(...valid.map(s=>s.lat)), maxLat = Math.max(...valid.map(s=>s.lat));
  let minLng = Math.min(...valid.map(s=>s.lng)), maxLng = Math.max(...valid.map(s=>s.lng));
  // Guard against a degenerate (zero-span) bounding box when all points
  // share the same coordinate, or there's only one station.
  if (maxLat - minLat < 0.002) { const c=(maxLat+minLat)/2; minLat=c-0.01; maxLat=c+0.01; }
  if (maxLng - minLng < 0.002) { const c=(maxLng+minLng)/2; minLng=c-0.01; maxLng=c+0.01; }
  // Add 12% padding around the bounding box so edge points aren't flush
  // against the frame.
  const latPad = (maxLat-minLat)*0.12, lngPad = (maxLng-minLng)*0.12;
  minLat -= latPad; maxLat += latPad; minLng -= lngPad; maxLng += lngPad;

  function project(lat, lng) {
    const x = pad + ((lng - minLng) / (maxLng - minLng)) * plotW;
    const y = pad + (1 - (lat - minLat) / (maxLat - minLat)) * plotH; // lat increases upward
    return [x, y];
  }

  // ── Seeded PRNG (mulberry32) — deterministic from the bounding box, so
  // re-generating the same report twice produces an identical sketch
  // rather than a different random road layout each time. ──
  function mulberry32(seed) {
    let state = seed >>> 0;
    return function() {
      state = (state + 0x6D2B79F5) >>> 0;
      let t = state;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t = (t + Math.imul(t ^ (t >>> 7), t | 61)) >>> 0;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const seedInput = Math.abs(Math.round((minLat+maxLat)*1000) + Math.round((minLng+maxLng)*1000)) || 1;
  const rand = mulberry32(seedInput);

  const roadColor = '#475569';
  const nH = 5, nV = 5;

  function jitteredLine(x1, y1, x2, y2, segments, jitterAmt) {
    const dx = x2-x1, dy = y2-y1;
    const length = Math.hypot(dx,dy) || 1;
    const nx = -dy/length, ny = dx/length;
    const pts = [[x1,y1]];
    for (let i=1; i<segments; i++) {
      const t = i/segments;
      const bx = x1+dx*t, by = y1+dy*t;
      const off = (rand()-0.5) * jitterAmt;
      pts.push([bx+nx*off, by+ny*off]);
    }
    pts.push([x2,y2]);
    return pts;
  }
  function strokePolyline(pts, width) {
    ctx.lineWidth = width;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke();
  }

  ctx.strokeStyle = roadColor;
  const hLinesY = [];
  for (let i=1; i<nH; i++) {
    const baseY = pad + (plotH/nH)*i;
    const y = baseY + (rand()-0.5) * (plotH/nH) * 0.25;
    hLinesY.push(y);
    strokePolyline(jitteredLine(pad, y, pad+plotW, y, 4, 6), i%2===1 ? 3 : 1.5);
  }
  const vLinesX = [];
  for (let i=1; i<nV; i++) {
    const baseX = pad + (plotW/nV)*i;
    const x = baseX + (rand()-0.5) * (plotW/nV) * 0.25;
    vLinesX.push(x);
    strokePolyline(jitteredLine(x, pad, x, pad+plotH, 4, 6), i%2===1 ? 3 : 1.5);
  }

  const allX = [pad, ...vLinesX, pad+plotW];
  const allY = [pad, ...hLinesY, pad+plotH];
  for (let k=0; k<5; k++) {
    const ix = Math.floor(rand()*(allX.length-2));
    const iy = Math.floor(rand()*(allY.length-2));
    const x1=allX[ix], y1=allY[iy], x2=allX[ix+1], y2=allY[iy+1];
    const mx = (x1+x2)/2 + (rand()-0.5)*16, my = (y1+y2)/2 + (rand()-0.5)*16;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.quadraticCurveTo(mx,my,x2,y2); ctx.stroke();
  }

  const buildingColor = '#CBD5E1';
  ctx.strokeStyle = buildingColor;
  ctx.lineWidth = 1;
  const cellsX = [pad, ...vLinesX, pad+plotW].sort((a,b)=>a-b);
  const cellsY = [pad, ...hLinesY, pad+plotH].sort((a,b)=>a-b);
  for (let ix=0; ix<cellsX.length-1; ix++) {
    for (let iy=0; iy<cellsY.length-1; iy++) {
      const cx0=cellsX[ix], cx1=cellsX[ix+1], cy0=cellsY[iy], cy1=cellsY[iy+1];
      const cw=cx1-cx0, ch=cy1-cy0;
      if (cw < 18 || ch < 18) continue;
      const nBuildings = rand() < 0.5 ? 1 : 2;
      for (let b=0; b<nBuildings; b++) {
        const bw = cw*(0.25+rand()*0.25), bh = ch*(0.25+rand()*0.25);
        const bx = cx0 + rand()*(cw-bw), by = cy0 + rand()*(ch-bh);
        ctx.strokeRect(bx, by, bw, bh);
      }
    }
  }

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, W, pad);
  ctx.fillRect(0, pad+plotH, W, H-(pad+plotH));
  ctx.fillRect(0, 0, pad, H);
  ctx.fillRect(pad+plotW, 0, W-(pad+plotW), H);
  ctx.strokeStyle = '#94A3B8'; ctx.lineWidth = 2;
  ctx.strokeRect(pad, pad, plotW, plotH);

  const naX = pad + plotW - 24, naY = pad + 28;
  ctx.strokeStyle = '#546391'; ctx.fillStyle = '#546391'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(naX, naY+18); ctx.lineTo(naX, naY-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(naX, naY-16); ctx.lineTo(naX-6, naY-6); ctx.lineTo(naX+6, naY-6); ctx.closePath(); ctx.fill();
  ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
  ctx.fillText('U', naX, naY+32);

  valid.forEach((s, i) => {
    const [x, y] = project(s.lat, s.lng);
    const hasFuel = (s.fuels||[]).some(f=>f.available);
    ctx.fillStyle = hasFuel ? '#00748F' : '#C28A1A';
    ctx.beginPath(); ctx.arc(x, y, 11, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(i+1), x, y+0.5);

    const label = String(s.name || '').slice(0, 22);
    if (label) {
      ctx.font = '10px Arial';
      const lw = ctx.measureText(label).width;
      const nearCompass = (x > naX - 50) && (y < naY + 50);
      const lx = x;
      const ly = nearCompass ? (y - 11 - 16) : (y + 11 + 5);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(lx-lw/2-3, ly-2, lw+6, 14);
      ctx.fillStyle = '#334155'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(label, lx, ly);
    }
  });
  ctx.textBaseline = 'alphabetic';

  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180, dLng = (lng2-lng1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  const midLat = (minLat+maxLat)/2;
  const fullWidthKm = haversineKm(midLat, minLng, midLat, maxLng);
  const pxPerKm = fullWidthKm > 0 ? plotW / fullWidthKm : 0;
  const candidates = [0.5,1,2,5,10,20,50,100,200];
  let scaleKm = candidates.find(c => c >= fullWidthKm/4) || candidates[candidates.length-1];
  const scalePx = scaleKm * pxPerKm;

  const sbX = pad, sbY = pad + plotH + 26;
  if (scalePx > 0 && isFinite(scalePx)) {
    ctx.strokeStyle = '#546391'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(sbX, sbY); ctx.lineTo(sbX+scalePx, sbY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sbX, sbY-4); ctx.lineTo(sbX, sbY+4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sbX+scalePx, sbY-4); ctx.lineTo(sbX+scalePx, sbY+4); ctx.stroke();
    ctx.fillStyle = '#546391'; ctx.font = '11px Arial'; ctx.textAlign = 'left';
    ctx.fillText(`~${scaleKm} km`, sbX, sbY+16);
  }
  ctx.fillStyle = '#94A3B8'; ctx.font = '10px Arial'; ctx.textAlign = 'right';
  ctx.fillText((opts&&opts.footnote) || 'Sketsa posisi relatif — bukan peta tercetak skala presisi', pad+plotW, sbY+16);

  return canvas.toDataURL('image/png');
}

// ═══════════════════════════════════════════════════════════
// POM BENSIN — Manual gas station map
// ═══════════════════════════════════════════════════════════
function GasStations({ stations, setStations, showToast }) {
  const {lang,T} = useLang();
  const mapElRef   = useRef(null);
  const mapRef     = useRef(null);
  const markersRef = useRef({});
  const placingRef = useRef(false);

  const [mapReady, setMapReady]   = useState(false);
  const [placing, setPlacing]     = useState(false);
  const [showForm, setShowForm]   = useState(false);
  const [editing, setEditing]     = useState(null); // station being edited, or null = new
  const [pendingLatLng, setPendingLatLng] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [search, setSearch]       = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [exporting, setExporting] = useState(false);

  const fuelStats = useMemo(() => computeFuelStats(stations), [stations]);

  const blankForm = () => ({ name:"", address:"", lat:"", lng:"", fuels: FUEL_TYPES_LIST.map(f=>({type:f,available:true})), notes:"" });
  const [form, setForm] = useState(blankForm);

  const setMapEl = useCallback((el) => { mapElRef.current = el; }, []);

  useEffect(() => {
    if (mapRef.current) return;
    let cancelled = false;
    let attempts = 0;

    function tryInit() {
      if (cancelled) return;
      if (!window.L) {
        attempts++;
        if (attempts > 40) {
          showToast(lang==="en" ? "Failed to load the map (Leaflet did not load). Check your internet connection and refresh." : "Gagal memuat peta (Leaflet tidak termuat). Cek koneksi internet lalu refresh halaman.", "error");
          return;
        }
        setTimeout(tryInit, 250);
        return;
      }
      if (!mapElRef.current) {
        attempts++;
        if (attempts > 40) return;
        setTimeout(tryInit, 250);
        return;
      }
      try {
        const map = window.L.map(mapElRef.current, {
          center: MAP_DEFAULT_CENTER,
          zoom: MAP_DEFAULT_ZOOM,
          zoomControl: true,
        });
        window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          subdomains: 'abc',
          maxZoom: 19,
          className: 'fleetos-map-tiles',
        }).addTo(map);

        map.on('click', (e) => {
          if (!placingRef.current) return;
          setPendingLatLng({ lat: e.latlng.lat, lng: e.latlng.lng });
          setEditing(null);
          setForm({ ...blankForm(), lat: e.latlng.lat.toFixed(6), lng: e.latlng.lng.toFixed(6) });
          setShowForm(true);
          setPlacing(false);
          placingRef.current = false;
          map.getContainer().classList.remove('crosshair-cursor');
        });

        mapRef.current = map;
        setMapReady(true);
      } catch (err) {
        console.error("Leaflet map init error:", err);
        showToast((lang==="en"?"An error occurred while loading the map: ":"Terjadi kesalahan saat memuat peta: ") + err.message, "error");
      }
    }

    tryInit();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => { placingRef.current = placing; }, [placing]);
  useEffect(() => {
    if (!mapRef.current) return;
    const el = mapRef.current.getContainer();
    if (placing) el.classList.add('crosshair-cursor'); else el.classList.remove('crosshair-cursor');
  }, [placing]);

  const pinIcon = (active) => window.L.divIcon({
    className: '',
    html: `<div class="gas-pin${active ? ' placing' : ''}"><svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white"><circle cx="12" cy="12" r="5"/></svg></div>`,
    iconSize: [30,30],
    iconAnchor: [15,30],
    popupAnchor: [0,-28],
  });

  useEffect(() => {
    if (!mapReady || !mapRef.current) return;
    const map = mapRef.current;
    const currentIds = new Set(stations.map(s=>String(s.id)));

    Object.keys(markersRef.current).forEach(id => {
      if (!currentIds.has(id)) { map.removeLayer(markersRef.current[id]); delete markersRef.current[id]; }
    });

    stations.forEach(s => {
      const id = String(s.id);
      const availableFuels = (s.fuels||[]).filter(f=>f.available).map(f=>f.type);
      const popupHtml = `
        <div style="min-width:180px">
          <div style="font-weight:700;font-size:13px;color:var(--t1);margin-bottom:3px">${escapeHtml(s.name)}</div>
          ${s.address ? `<div style="font-size:11px;color:var(--t3);margin-bottom:6px">${escapeHtml(s.address)}</div>` : ''}
          <div style="font-size:10px;color:var(--t4);margin-bottom:3px">${T.gasFuelsAvail}</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
            ${availableFuels.length ? availableFuels.map(f=>`<span style="font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(0,184,224,0.14);color:var(--accent);font-weight:600">${escapeHtml(f)}</span>`).join('') : `<span style="font-size:11px;color:var(--t5)">${T.gasFuelEmpty}</span>`}
          </div>
          <div style="display:flex;gap:6px">
            <button data-action="edit" data-id="${id}" style="flex:1;font-size:11px;font-weight:600;padding:5px 8px;border-radius:6px;border:1px solid var(--border-12);background:var(--surface-2);color:var(--t2);cursor:pointer">${T.edit}</button>
            <button data-action="del" data-id="${id}" style="font-size:11px;font-weight:600;padding:5px 8px;border-radius:6px;border:1px solid rgba(224,82,74,0.3);background:rgba(224,82,74,0.1);color:var(--danger);cursor:pointer">${T.delete}</button>
          </div>
        </div>`;

      if (markersRef.current[id]) {
        markersRef.current[id].setLatLng([s.lat, s.lng]);
        markersRef.current[id].setPopupContent(popupHtml);
      } else {
        const marker = window.L.marker([s.lat, s.lng], { icon: pinIcon(false) }).addTo(map);
        marker.bindPopup(popupHtml);
        marker.on('popupopen', () => {
          const el = marker.getPopup().getElement();
          if (!el) return;
          const editBtn = el.querySelector('[data-action="edit"]');
          const delBtn  = el.querySelector('[data-action="del"]');
          if (editBtn) editBtn.onclick = () => openEdit(s);
          if (delBtn)  delBtn.onclick  = () => setConfirmDel(s);
        });
        markersRef.current[id] = marker;
      }
    });
  }, [stations, mapReady, lang]);

  function escapeHtml(str) {
    return String(str||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  const startPlacing = () => {
    setPlacing(true);
    showToast(T.clickMapMsg);
  };
  const cancelPlacing = () => { setPlacing(false); };

  const openManualAdd = () => {
    setEditing(null);
    setPendingLatLng(null);
    setForm(blankForm());
    setShowForm(true);
  };

  const openEdit = (s) => {
    setEditing(s);
    setForm({
      name: s.name, address: s.address||"",
      lat: String(s.lat), lng: String(s.lng),
      fuels: FUEL_TYPES_LIST.map(f => {
        const existing = (s.fuels||[]).find(x=>x.type===f);
        return { type:f, available: existing ? !!existing.available : false };
      }),
      notes: s.notes||"",
    });
    setShowForm(true);
    if (mapRef.current) mapRef.current.flyTo([s.lat, s.lng], Math.max(mapRef.current.getZoom(), 15), {duration:0.6});
  };

  const toggleFuel = (type) => setForm(p => ({ ...p, fuels: p.fuels.map(f => f.type===type ? {...f, available:!f.available} : f) }));

  const canSave = form.name.trim() && form.lat !== "" && form.lng !== "" && !isNaN(Number(form.lat)) && !isNaN(Number(form.lng));

  const save = async () => {
    if (!canSave) return;
    const data = {
      name: form.name.trim(),
      address: form.address.trim(),
      lat: Number(form.lat),
      lng: Number(form.lng),
      fuels: form.fuels,
      notes: form.notes.trim(),
      updatedAt: new Date().toISOString(),
    };
    let updated;
    if (editing) {
      updated = stations.map(s => s.id===editing.id ? { ...data, id:editing.id, createdAt:s.createdAt } : s);
    } else {
      updated = [...stations, { ...data, id:"GS-"+Date.now(), createdAt:new Date().toISOString() }];
    }
    setStations(updated);
    setShowForm(false);
    if (GAS_URL) {
      const ok = await syncToGASChecked("saveGasStations", { stations: updated });
      if (ok) {
        showToast(editing ? T.gasStationUpdated : T.gasStationAdded);
      } else {
        showToast(lang==="en"
          ? "Saved in view, BUT failed to persist to Google Sheets. Make sure the \"GasStations\" sheet exists — check console (F12) for details."
          : "Tersimpan di tampilan, TAPI gagal disimpan ke Google Sheet. Pastikan sheet \"GasStations\" sudah dibuat — lihat console (F12) untuk detail.", "error");
      }
    } else {
      showToast(editing ? T.gasStationUpdated : T.gasStationAdded);
    }
  };

  const del = async (s) => {
    const updated = stations.filter(x=>x.id!==s.id);
    setStations(updated);
    setConfirmDel(null);
    if (GAS_URL) {
      const ok = await syncToGASChecked("saveGasStations", { stations: updated });
      showToast(ok ? T.gasStationDeleted : (lang==="en"?"Removed from view, but failed to sync to Google Sheets":"Dihapus dari tampilan, tapi gagal sync ke Google Sheet"), "error");
    } else {
      showToast(T.gasStationDeleted,"error");
    }
  };

  const flyToStation = (s) => {
    setSelectedId(s.id);
    if (mapRef.current) {
      mapRef.current.flyTo([s.lat, s.lng], 16, {duration:0.7});
      setTimeout(() => { const m = markersRef.current[String(s.id)]; if (m) m.openPopup(); }, 700);
    }
  };

  const exportPDF = () => {
    if (exporting || stations.length === 0) {
      if (stations.length === 0) showToast(T.gasNoStationsToast, "error");
      return;
    }
    setExporting(true);
    try {
      const now = new Date();
      const dateStr = now.toLocaleDateString(lang==="en"?"en-GB":"id-ID",{day:"2-digit",month:"2-digit",year:"numeric"});
      const timeStr = now.toLocaleTimeString(lang==="en"?"en-GB":"id-ID",{hour:"2-digit",minute:"2-digit"}).replace(":",".");
      const pdf = makeFleetPDF({
        title: T.gasReportTitle,
        subtitle: T.gasReportSub,
        metaRight1: `${fuelStats.total} ${lang==="en"?"stations recorded":"SPBU tercatat"}`,
        metaRight2: (lang==="en"?"Generated ":"Dibuat ") + dateStr + ", " + timeStr,
        footerLeft: "FleetOS  ·  " + (lang==="en"?"Gas Station Report":"Gas Station Report") + "  ·  Confidential",
        pageLabel: lang==="en" ? "Page" : "Halaman",
      });
      if (!pdf) { showToast(lang==="en"?"PDF library failed to load":"Library PDF gagal dimuat","error"); setExporting(false); return; }
      const { doc, C, ML, MR, CW, drawPageHeader, drawPageFooter, needY, secLbl, drawStatCards, periodBar } = pdf;

      drawPageHeader();
      periodBar(`${fuelStats.total} ${lang==="en"?"stations":"SPBU"} · ${fuelStats.uniqueFuelTypesAvailable}/${FUEL_TYPES_LIST.length} ${lang==="en"?"fuel types tracked":"jenis BBM terpantau"}`, lang==="en"?"Latest data recorded in the system":"Update terakhir tercatat di sistem", lang==="en"?"PERIOD":"PERIOD");

      secLbl(T.gasReportSummary);
      drawStatCards(
        [ {lbl:T.gasTotalStations, val:String(fuelStats.total), sub:T.gasStationsPoint},
          {lbl:T.gasAvgFuelPerStation, val:fuelStats.avgFuelsPerStation.toFixed(1), sub:T.gasFuelPerPoint},
          {lbl:lang==="en"?"Complete Data":"Data Lengkap", val:String(fuelStats.complete), sub:`${lang==="en"?"of":"dari"} ${fuelStats.total} ${lang==="en"?"stations":"SPBU"}`},
          {lbl:T.gasNoDataYet, val:String(fuelStats.noDataCount), sub:T.gasNeedsFilling} ],
        [C.blue, C.green, C.green, C.orange]
      );

      needY(20);
      secLbl(T.gasReportFuelSpread);
      doc.autoTable({
        startY: pdf.Y,
        margin: {left:ML, right:MR},
        theme: "grid",
        styles: { fontSize:8.5, cellPadding:3, textColor:C.txt1, lineColor:C.border, lineWidth:0.2 },
        headStyles: { fillColor:C.navy, textColor:255, fontStyle:"bold", fontSize:8, halign:"left" },
        alternateRowStyles: { fillColor:[248,249,253] },
        columnStyles: { 0:{halign:"left",fontStyle:"bold",cellWidth:60}, 1:{halign:"center"}, 2:{halign:"right"}, 3:{halign:"left"} },
        head: [[T.gasReportFuelType,T.gasReportCount,T.gasReportCoverage,T.gasReportStatus]],
        body: fuelStats.fuelCounts.map(f => [f.type, String(f.count), f.pct.toFixed(0)+"%", f.count===0 ? T.gasReportNoStock : f.count===fuelStats.total ? T.gasReportAllStock : T.gasReportSomeStock]),
        willDrawPage: drawPageFooter,
      });
      pdf.Y = doc.lastAutoTable.finalY + 8;

      needY(18);
      secLbl(T.gasReportSketch);
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(C.txt3[0],C.txt3[1],C.txt3[2]);
      doc.text(lang==="en"
        ? "Relative position of each point based on stored coordinates. Numbers on the map match the detail table order on the next page."
        : "Posisi relatif tiap titik berdasarkan koordinat tersimpan. Nomor pada peta sesuai urutan tabel detail di halaman berikutnya.", ML, pdf.Y);
      pdf.Y += 6;
      const sketchDataUrl = drawStationSketch(stations, { width:1000, height:560,
        emptyMsg: lang==="en" ? "No stations to display yet" : "Belum ada titik SPBU untuk ditampilkan",
        footnote: lang==="en" ? "Relative position sketch — not a precision scale map" : "Sketsa posisi relatif — bukan peta tercetak skala presisi" });
      const sketchW = CW;
      const sketchH = sketchW * (560/1000);
      needY(sketchH + 4);
      doc.addImage(sketchDataUrl, 'PNG', ML, pdf.Y, sketchW, sketchH);
      pdf.Y += sketchH + 8;

      doc.addPage(); drawPageHeader();
      secLbl(T.gasReportDetail);
      doc.autoTable({
        startY: pdf.Y,
        margin: {left:ML, right:MR},
        theme: "grid",
        styles: { fontSize:7.8, cellPadding:2.8, textColor:C.txt1, lineColor:C.border, lineWidth:0.2 },
        headStyles: { fillColor:C.navy, textColor:255, fontStyle:"bold", fontSize:7.5, halign:"center" },
        alternateRowStyles: { fillColor:[248,249,253] },
        columnStyles: { 0:{halign:"center",cellWidth:10}, 1:{halign:"left",cellWidth:42}, 2:{halign:"left",cellWidth:55}, 3:{halign:"left"}, 4:{halign:"left",cellWidth:48} },
        head: [[T.gasReportNo,T.gasReportStationName,T.gasReportAddr,T.gasReportFuelsCol,T.gasReportNoteCol]],
        body: stations.map((s,i) => [
          String(i+1),
          s.name||"-",
          s.address || `${s.lat?.toFixed(5)}, ${s.lng?.toFixed(5)}`,
          (s.fuels||[]).filter(f=>f.available).map(f=>f.type).join(", ") || T.gasReportNotFilled,
          s.notes || "-",
        ]),
        willDrawPage: drawPageFooter,
      });
      pdf.Y = doc.lastAutoTable.finalY + 8;

      drawPageFooter();
      doc.save(`FleetOS_PomBensin_Report_${dateStr.replace(/\//g,"-")}.pdf`);
      showToast(lang==="en"?"PDF report created!":"Report PDF berhasil dibuat!");
    } catch (err) {
      console.error("Gas station PDF export error:", err);
      showToast((lang==="en"?"Failed to generate PDF report: ":"Gagal membuat report PDF: ") + err.message, "error");
    } finally {
      setExporting(false);
    }
  };

  const [searchError, setSearchError] = useState(false);
  useEffect(() => {
    if (!search.trim() || search.trim().length < 3) { setSearchResults([]); setSearchError(false); return; }
    const controller = new AbortController();
    const handle = setTimeout(async () => {
      setSearching(true);
      setSearchError(false);
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(search)}`, { signal: controller.signal });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const json = await res.json();
        setSearchResults(Array.isArray(json) ? json : []);
      } catch (e) {
        if (e.name !== "AbortError") {
          setSearchResults([]);
          setSearchError(true);
        }
      } finally {
        if (!controller.signal.aborted) setSearching(false);
      }
    }, 600);
    return () => { clearTimeout(handle); controller.abort(); };
  }, [search]);

  const pickSearchResult = (r) => {
    setForm(p => ({ ...p, lat: Number(r.lat).toFixed(6), lng: Number(r.lon).toFixed(6), address: p.address || r.display_name }));
    setSearch(""); setSearchResults([]);
    if (mapRef.current) mapRef.current.flyTo([Number(r.lat), Number(r.lon)], 16, {duration:0.6});
  };

// REPORTS
// ═══════════════════════════════════════════════════════════
function Reports({ claims, kantong, showToast }) {
  const {lang,T} = useLang();
  const now = new Date();

  const [filterMode, setFilterMode] = useState("month");
  const [selYear,    setSelYear]    = useState(now.getFullYear());
  const [selMonth,   setSelMonth]   = useState(now.getMonth());
  const [dateFrom,   setDateFrom]   = useState(now.toISOString().slice(0,8) + "01");
  const [dateTo,     setDateTo]     = useState(now.toISOString().slice(0,10));

  const [generated,  setGenerated]  = useState(false);
  const [report,     setReport]     = useState(null);
  const [downloading,setDownloading]= useState(false);
  const [activeTab,  setActiveTab]  = useState("claim");

  const filterClaims = () => {
    if (filterMode === "month") {
      return claims.filter(c => {
        const d = new Date(getClaimPeriodDate(c));
        return d.getFullYear() === selYear && d.getMonth() === selMonth;
      });
    } else {
      const from = new Date(dateFrom); from.setHours(0,0,0,0);
      const to   = new Date(dateTo);   to.setHours(23,59,59,999);
      return claims.filter(c => { const d = new Date(getClaimPeriodDate(c)); return d >= from && d <= to; });
    }
  };

  const periodLabel = filterMode === "month"
    ? `${T.months[selMonth]} ${selYear}`
    : `${fmtDate(dateFrom,lang)} – ${fmtDate(dateTo,lang)}`;

  const buildReport = () => {
    const monthClaims = filterClaims();
    if (monthClaims.length === 0) return { empty: true, monthClaims: [] };

    const reportYear  = filterMode === "month" ? selYear  : new Date(dateFrom).getFullYear();
    const reportMonth = filterMode === "month" ? selMonth : new Date(dateFrom).getMonth();

    const weekMap = {};
    monthClaims.forEach(c => {
      const w     = getWeekOfMonth(getClaimPeriodDate(c));
      const types = getClaimTypes(c);
      const total = getClaimTotal(c);
      if (!weekMap[w]) weekMap[w] = { week: w, claims: [], total: 0, drivers: new Set(), typeMap: {} };
      weekMap[w].claims.push(c);
      weekMap[w].total += total;
      weekMap[w].drivers.add(getClaimDriver(c));
      types.forEach(t => { weekMap[w].typeMap[t] = (weekMap[w].typeMap[t] || 0) + 1; });
    });
    const weeks = Object.values(weekMap).sort((a,b) => a.week - b.week).map(w => {
      const topTypeEntry = Object.entries(w.typeMap).sort((a,b) => b[1]-a[1])[0];
      return { ...w, drivers: w.drivers.size, topType: topTypeEntry ? topTypeEntry[0] : "—" };
    });

    const driverMap = {};
    monthClaims.forEach(c => {
      const d     = getClaimDriver(c);
      const total = getClaimTotal(c);
      const types = getClaimTypes(c);
      if (!driverMap[d]) driverMap[d] = { driver: d, total: 0, count: 0, typeMap: {}, weeks: new Set() };
      driverMap[d].total += total;
      driverMap[d].count++;
      types.forEach(t => { driverMap[d].typeMap[t] = (driverMap[d].typeMap[t] || 0) + 1; });
      driverMap[d].weeks.add(getWeekOfMonth(getClaimPeriodDate(c)));
    });
    const byDriver = Object.values(driverMap).sort((a,b) => b.total - a.total).map(d => {
      const topTypeEntry = Object.entries(d.typeMap).sort((a,b) => b[1]-a[1])[0];
      return { ...d, weeks: d.weeks.size, topType: topTypeEntry ? topTypeEntry[0] : "—" };
    });

    const typeMap = {};
    monthClaims.forEach(c => {
      getClaimItems(c).forEach(item => {
        const t = item.type || "Other";
        const v = Number(item.total) || 0;
        if (!typeMap[t]) typeMap[t] = { type: t, total: 0, count: 0 };
        typeMap[t].total += v;
        typeMap[t].count++;
      });
    });
    const byType = Object.values(typeMap).sort((a,b) => b.total - a.total);

    const grand       = monthClaims.reduce((s,c) => s + getClaimTotal(c), 0);
    const avgPerWeek  = weeks.length  ? Math.round(grand / weeks.length)       : 0;
    const topDriver   = byDriver[0] || null;
    const topType     = byType[0]   || null;
    const topWeek     = [...weeks].sort((a,b) => b.total - a.total)[0] || null;

    // ── Management-facing insights: weekly report, avg/week, top driver,
    // top category, monthly total — explicit sentences so this reads
    // clearly for anyone reviewing the report, not just the person who
    // built it. ──
    const insights = [];
    insights.push(T.insMonthlyTotal(fmt(grand), monthClaims.length));
    if (weeks.length) insights.push(T.insAvgWeek(fmt(avgPerWeek), weeks.length));
    if (topDriver) insights.push(T.insTopDriver(topDriver.driver, topDriver.count, fmt(topDriver.total)));
    if (topType)   insights.push(T.insTopType(topType.type, topType.count, grand > 0 ? (topType.total/grand*100).toFixed(1) : 0));
    if (topWeek)   insights.push(T.insTopWeek(topWeek.week, fmt(topWeek.total), topWeek.claims.length));

    const half      = Math.ceil(weeks.length / 2);
    const firstHalf = weeks.slice(0, half).reduce((s,w) => s + w.total, 0);
    const secHalf   = weeks.slice(half).reduce((s,w) => s + w.total, 0);
    if (weeks.length >= 2) {
      if      (secHalf > firstHalf * 1.1) insights.push(T.insTrendUp(((secHalf-firstHalf)/Math.max(firstHalf,1)*100).toFixed(0)));
      else if (secHalf < firstHalf * 0.9) insights.push(T.insTrendDown(((firstHalf-secHalf)/Math.max(firstHalf,1)*100).toFixed(0)));
      else                                insights.push(T.insTrendFlat);
    }
    if (byDriver.length > 1) {
      const avg = grand / byDriver.length;
      const hs  = byDriver.filter(d => d.total > avg * 1.5);
      if (hs.length) insights.push(T.insHighSpenders(hs.map(d=>d.driver).join(", ")));
    }

    let cashflowData = null;
    if (kantong) {
      const totalBudget    = kantong.totalBudget    || 0;
      const allocOpDriver  = kantong.allocOpDriver  || 0;
      const allocEmergency = kantong.allocEmergency || 0;
      const cashAvailable  = kantong.cashAvailable  || 0;
      const claimSubmitted = kantong.claimSubmitted || 0;
      const claimPaid      = kantong.claimPaid      || 0;
      const totalAlokasi   = allocOpDriver + allocEmergency;
      const outstanding    = totalAlokasi + cashAvailable + claimSubmitted + claimPaid;
      cashflowData = { totalBudget, allocOpDriver, allocEmergency, totalAlokasi, cashAvailable, claimSubmitted, claimPaid, outstanding, gap: outstanding - totalBudget };
    }

    return { monthClaims, weeks, byDriver, byType, grand, avgPerWeek, topDriver, topType, topWeek, insights, cashflowData, _reportYear: reportYear, _reportMonth: reportMonth };
  };

  const generate = () => { setReport(buildReport()); setGenerated(true); };
  const refresh  = () => { setReport(buildReport()); };

  const downloadCSV = () => {
    if (!report || report.empty) return;
    const rows = [[T.week,T.claimPeriod,T.submissionDate,T.driverCol,T.claimTypeLbl,T.claimDetails,T.nominal,"Status"]];
    [...report.monthClaims].sort((a,b) => new Date(getClaimPeriodDate(a))-new Date(getClaimPeriodDate(b))).forEach(c => {
      const items  = getClaimItems(c);
      const driver = getClaimDriver(c);
      const pDate  = getClaimPeriodDate(c);
      const sDate  = getClaimSubmissionDate(c);
      const week   = getWeekOfMonth(pDate);
      items.forEach(item => rows.push([`${T.week} ${week}`, fmtDate(pDate,lang), fmtDate(sDate,lang), driver, item.type||"", item.expr||"", item.total||0, c.status]));
    });
    const csv  = rows.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `FleetOS_Report_${periodLabel.replace(/\s/g,"_")}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  // ── PDF — jsPDF + autoTable, fleet-style landscape layout ──────────────
  const downloadPDF = () => {
    if (!report || report.empty || downloading) return;
    setDownloading(true);
    try {
      const now = new Date();
      const dateStr = now.toLocaleDateString(lang==="en"?"en-GB":"id-ID",{day:"2-digit",month:"2-digit",year:"numeric"});
      const timeStr = now.toLocaleTimeString(lang==="en"?"en-GB":"id-ID",{hour:"2-digit",minute:"2-digit"}).replace(":",".");
      const pdf = makeFleetPDF({
        title: lang==="en" ? "FLEET OPERATIONS — FleetOS" : "FLEET OPERATIONS — FleetOS",
