async function gasCall(action, payload) {
  if (!GAS_URL) return null;
  try {
    const url = GAS_URL + "?action=" + encodeURIComponent(action) + (payload ? "&payload=" + encodeURIComponent(JSON.stringify(payload)) : "");
    const res = await fetch(url);
    if (!res.ok) {
      console.error("GAS HTTP error [" + action + "]: status " + res.status + " " + res.statusText);
      return null;
    }
    const json = await res.json();
    if (!json.ok) { console.error("GAS app error [" + action + "]:", json.error); return null; }
    return json.data;
  } catch(e) {
    // "Failed to fetch" / "NetworkError" here means the request never
    // reached the GAS server at all (or the browser couldn't read the
    // response) — this is NOT the same as json.ok===false above.
    // Likely causes: deployment URL outdated/removed, deployment access
    // is not set to "Anyone", or the network/extension is blocking
    // script.google.com. Open GAS_URL + "?action=ping" directly in a
    // browser tab to isolate: if that also fails, it's a deployment/
    // access problem, not something fixable from this frontend code.
    console.error("GAS network error [" + action + "] — request never completed:", e.message);
    console.error("Diagnose: open this URL directly in a new browser tab:", GAS_URL + "?action=ping");
    return null;
  }
}
const gasGet  = (action)          => gasCall(action, null);
async function syncToGAS(action, payload) {
  if (!GAS_URL) return;
  gasCall(action, payload).catch(e => console.error("Sync bg error:", e));
}
// Same as syncToGAS but resolves to true/false instead of firing-and-forgetting.

// fire-and-forget syncToGAS above to avoid blocking the UI on every save.
async function syncToGASChecked(action, payload) {
  if (!GAS_URL) return true; // no backend configured = nothing to fail, local-only mode
  const result = await gasCall(action, payload);

// Week of month — Monday-based, SINGLE canonical definition used everywhere
const getWeekOfMonth = dateStr => {
  const d = new Date(dateStr);
  if (isNaN(d)) return 1;
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1;
  return Math.floor((d.getDate() + startDay - 1) / 7) + 1;
};
const weekLabel = (w, year, month) => {
  const monthStart = new Date(year, month, 1);
  const startDay   = monthStart.getDay() === 0 ? 6 : monthStart.getDay() - 1;
  const wkStart    = new Date(year, month, 1 + (w - 1) * 7 - startDay);
  const wkEnd      = new Date(wkStart); wkEnd.setDate(wkStart.getDate() + 6);
  const f2 = d => d.toLocaleDateString("id-ID", { day:"2-digit", month:"short" });
  return `${f2(wkStart)} – ${f2(wkEnd)}`;
};

// Build real notifications from live data — vehicle docs + Dana Operasional gap only (no fuel).
const buildNotifs = (vehicles, kantong) => {
  const out = [];

  (vehicles||[]).forEach(v => {
    [["KIR", v.kir], ["Service", v.service], ["STNK", v.stnk]].forEach(([label, date]) => {
      const days = daysUntil(date);
      if (days <= 30) {
        out.push({
          id: `doc-${v.id}-${label}`,
          type: days <= 7 ? "warning" : "info",
          title: `${label} ${days <= 0 ? "Sudah Lewat" : "Reminder"} — ${v.plate}`,
          msg: days <= 0
            ? `${label} ${v.type || ""} (${v.plate}) sudah melewati tanggal ${fmtDate(date)}.`
            : `${label} ${v.type || ""} (${v.plate}) habis dalam ${days} hari (${fmtDate(date)}). Siapkan berkas!`,
          sortKey: days,
        });
      }
    });
  });

  if (kantong) {
    const totalAlokasi = (kantong.allocOpDriver||0) + (kantong.allocEmergency||0);
    const outstanding  = totalAlokasi + (kantong.cashAvailable||0) + (kantong.claimSubmitted||0) + (kantong.claimPaid||0);
    const gap = outstanding - (kantong.totalBudget||0);
    if (gap > 0) {
      out.push({
        id: "opfund-gap-over",
        type: "warning",
        title: "Dana Operasional GAP Positif",
        msg: `Outstanding cash operational melebihi total dana sebesar Rp ${fmt(gap)}. Perlu pengecekan.`,
        sortKey: -2,
      });
    } else if (gap < 0) {
      out.push({
        id: "opfund-gap-under",
        type: "info",
        title: "Dana Operasional Belum Terpakai Penuh",
        msg: `Outstanding cash operational masih Rp ${fmt(Math.abs(gap))} di bawah total dana.`,
        sortKey: -1,
      });
    }
  }

  return out.sort((a,b) => a.sortKey - b.sortKey).map(n => ({ ...n, read:false }));
};

// ─── PDF EXPORT HELPER (jsPDF + autoTable, fleet-style landscape) ───────────
// Shared header/footer/stat-card drawing used by both Claim and Cashflow PDFs.
function makeFleetPDF(opts) {
  const JsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
  if (!JsPDF) { return null; }
  const doc = new JsPDF({ orientation:"landscape", unit:"mm", format:"a4" });
  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();
  const ML = 14, MR = 14;
  const CW = PW - ML - MR;
  let Y = 0;

  // Color tokens sampled directly from the reference Canteen Operations PDF —
  // kept identical here so every report in the suite shares one visual system.
  const C = {
    navy:    [10,20,51],     // header/footer band
    blue:    [58,91,219],    // primary accent: period bar, section label, default stat bar
    green:   [22,163,73],
    orange:  [234,89,12],
    purple:  [109,40,216],
    red:     [214,52,52],
    white:   [255,255,255],
    txt1:    [13,19,40],     // value numbers, section label text — near-black
    label:   [84,99,145],    // stat card small labels (ORDERED/CONSUMED/...) — same on every card regardless of accent color
    txt3:    [110,120,150],  // muted meta text (subtitles, sub-labels, footer)
    headerSub:[150,165,200], // header subtitle / meta lines on navy bg
    periodBg:[234,239,255],  // period bar background tint
    border:  [206,211,227],
    bg:      [255,255,255],  // page background is plain white, not off-white
  };

  function sf(rgb){ doc.setFillColor(rgb[0],rgb[1],rgb[2]); }
  function sd(rgb){ doc.setDrawColor(rgb[0],rgb[1],rgb[2]); }
  function st(rgb){ doc.setTextColor(rgb[0],rgb[1],rgb[2]); }

  function drawPageHeader() {
    // Single full-bleed navy band — no separate logo box, no accent stripe
    // beneath it. The body content starts directly below in white.
    sf(C.navy); doc.rect(0,0,PW,24,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(15); st(C.white);
    doc.text(opts.title || 'LAPORAN', ML, 11);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); st(C.headerSub);
    doc.text(opts.subtitle || '', ML, 17.5);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); st(C.white);
    doc.text(opts.metaRight1 || '', PW-MR, 10, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); st(C.headerSub);
    doc.text(opts.metaRight2 || '', PW-MR, 16, {align:'right'});
    Y = 32;
  }

  function drawPageFooter() {
    const fy = PH - 9;
    sf(C.navy); doc.rect(0,fy-2,PW,11,'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(7); st(C.headerSub);
    doc.text(opts.footerLeft || '', ML, fy+3.5);
    doc.text('Halaman '+doc.internal.getNumberOfPages(), PW-MR, fy+3.5, {align:'right'});
  }

  function needY(h) { if (Y + h > PH - 14) { doc.addPage(); drawPageHeader(); } }

  // Section label: bold near-black text in sentence case (NOT uppercase),
  // thick short vertical accent bar to its left, thin rule continuing to
  // the right edge of the content area.
  function secLbl(label) {
    needY(13);
    sf(C.blue); doc.rect(ML, Y, 1.4, 5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(10.5); st(C.txt1);
    doc.text(label, ML+4.5, Y+4.2);
    sd(C.border); doc.setLineWidth(0.3);
    doc.line(ML+4.5+doc.getTextWidth(label)+4, Y+2.2, PW-MR, Y+2.2);
    Y += 11;
  }

  // Stat cards: white bg, thick solid accent bar on top (color varies per
  // card), label text always the same neutral blue-grey regardless of the
  // accent color, value always near-black bold — never colored.
  function drawStatCards(cards, colors) {
    needY(26);
    const gap = 4.5;
    const w = (CW - gap*(cards.length-1)) / cards.length;
    const h = 22;
    cards.forEach((c,i) => {
      const x = ML + i*(w+gap);
      sf(C.white); sd(C.border); doc.setLineWidth(0.25);
      doc.roundedRect(x, Y, w, h, 1.6, 1.6, 'FD');
      const col = colors[i] || C.blue;
      sf(col); doc.roundedRect(x, Y, w, 3.2, 1.6, 1.6, 'F');
      doc.rect(x, Y+1.6, w, 1.6, 'F'); // square off the bottom of the accent bar so it doesn't bleed rounded corners into the card body
      doc.setFont('helvetica','bold'); doc.setFontSize(6.8); st(C.label);
      doc.text(String(c.lbl).toUpperCase(), x+4.5, Y+9.5);
      doc.setFont('helvetica','bold'); doc.setFontSize(15); st(C.txt1);
      doc.text(String(c.val), x+4.5, Y+16.5);
      if (c.sub) { doc.setFont('helvetica','normal'); doc.setFontSize(6.8); st(C.txt3); doc.text(String(c.sub), x+4.5, Y+20); }
    });
    Y += h + 6;
  }

  // Period bar: light blue tint background, solid blue block on the left
  // edge, "PERIOD" label in blue, value in dark text, optional right-aligned
  // meta note in muted grey.
  function periodBar(label, sub) {
    needY(14);
    const h = 11;
    sf(C.periodBg); sd([191,205,247]); doc.setLineWidth(0.25);
    doc.roundedRect(ML, Y, CW, h, 1.6, 1.6, 'FD');
    sf(C.blue); doc.rect(ML, Y, 4, h, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(7.5); st(C.blue);
    doc.text('PERIOD', ML+8, Y+h/2+1);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); st(C.txt1);
    doc.text(String(label), ML+32, Y+h/2+1);
    if (sub) { doc.setFont('helvetica','normal'); doc.setFontSize(7.5); st(C.txt3); doc.text(String(sub), PW-MR-3, Y+h/2+1, {align:'right'}); }
    Y += h + 5;
  }

  return { doc, C, PW, PH, ML, MR, CW, get Y(){return Y;}, set Y(v){Y=v;},
    drawPageHeader, drawPageFooter, needY, secLbl, drawStatCards, periodBar, sf, sd, st };
}

  const [gasStations, setGasStations] = useState(INIT_GAS_STATIONS);
  const [toast,     setToast]     = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [gasReady,  setGasReady]  = useState(false);
  const [gasError,  setGasError]  = useState(false);
  const [theme,     setTheme]     = useState(() => {
    if (typeof document !== "undefined") {
      const attr = document.documentElement.getAttribute("data-theme");
      if (attr === "light" || attr === "dark") return attr;
    }
    return "dark";
  });

  const toggleTheme = () => {
    setTheme(prev => {
      const next = prev === "dark" ? "light" : "dark";
      try { localStorage.setItem("fleetos-theme", next); } catch(e) {}
      if (typeof document !== "undefined") document.documentElement.setAttribute("data-theme", next);
      return next;
    });
  };

  useEffect(() => {
    if (!GAS_URL) {
      setVehicles(INIT_VEHICLES); setClaims(INIT_CLAIMS); setDrivers(INIT_DRIVERS);
      setTiers(INIT_TIERS); setKantong(INIT_KANTONG); setGasStations(INIT_GAS_STATIONS);
      setNotifs(buildNotifs(INIT_VEHICLES, INIT_KANTONG));
      return;
    }
    setLoading(true); setGasError(false);
    gasGet("getAll").then(data => {
      if (!data) { setGasError(true); return; }
      const resolvedVehicles = (data.vehicles||[]).map(v=>({...v,id:v.id||String(Date.now()),odometer:Number(v.odometer)||0,year:Number(v.year)||2020}));
      setVehicles(resolvedVehicles);
      setClaims((data.claims||[]).map(c => {
        let items = [];
        if (Array.isArray(c.items) && c.items.length > 0) {
          items = c.items;
        } else if (typeof c.items === "string" && c.items.trim()) {
          try { const parsed = JSON.parse(c.items); if (Array.isArray(parsed)) items = parsed; } catch (e) {}
        }
        if (items.length === 0 && c.type) items = [{ type:c.type, expr:c.expr||"", total:Number(c.total)||0 }];
        items = items.map(it => ({ ...it, total:Number(it.total)||0 }));
        return { ...c, total:Number(c.total)||0, items, driverName:c.driverName||c.driver||"" };
      }));
      setDrivers((data.drivers||[]).length>0 ? data.drivers : INIT_DRIVERS);
      setTiers((data.tiers||[]).length>0 ? data.tiers.map(t=>({...t,amount:Number(t.amount)||0,count:Number(t.count)||0})) : INIT_TIERS);
      const resolvedKantong = data.kantong || INIT_KANTONG;
      setKantong(resolvedKantong);

        ...s,

function Claims({claims,setClaims,drivers,showToast,gasReady}) {
  const today = new Date().toISOString().slice(0,10);
  const blankItem = () => ({id:Date.now()+Math.random(),type:"Gasoline",expr:""});

  const updateItem = (id,field,val) => setForm(p=>({...p,items:p.items.map(x=>x.id===id?{...x,[field]:val}:x)}));
  const itemTotal  = item => evalExpr(item.expr)||0;
  const grandTotal = form.items.reduce((s,item)=>s+itemTotal(item),0);
  const allValid   = form.items.length>0&&form.items.every(i=>i.type&&itemTotal(i)>0);
  const canSave    = form.driver&&form.date&&allValid;
  const allDrivers = [...new Set(claims.map(c=>getClaimDriver(c)).filter(Boolean))];
  const filtered   = claims.filter(c=>{
    const d = getClaimDriver(c);

  const driverList = drivers&&drivers.length>0 ? drivers.map(d=>typeof d==="string"?d:d.name).filter(Boolean) : DRIVERS;
  const save = async () => {
    if (!canSave||submitting) return;
    setSubmitting(true);

      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:7}},
        React.createElement("span",{className:"num",style:{fontSize:13,fontWeight:700,color:"var(--accent)"}},filtered.length),
        React.createElement("span",{style:{fontSize:12,color:"var(--t4)"}},"Claim")

        "Total: ",React.createElement("span",{className:"num",style:{color:"var(--t1)",fontWeight:700}},"Rp ",fmt(filtered.reduce((s,c)=>s+(c.total||0),0)))

// ═══════════════════════════════════════════════════════════
// POM BENSIN — shared stats + sketch helpers (used by both the inline
// infographic and the PDF export, so the numbers always match exactly)
// ═══════════════════════════════════════════════════════════
function computeFuelStats(stations) {
  const total = stations.length;

  // Per-fuel availability count
  const fuelCounts = FUEL_TYPES_LIST.map(type => {
    const count = stations.filter(s => (s.fuels||[]).some(f => f.type===type && f.available)).length;
    return { type, count, pct: total>0 ? (count/total*100) : 0 };
  }).sort((a,b) => b.count - a.count);

  const uniqueFuelTypesAvailable = fuelCounts.filter(f => f.count > 0).length;
  const avgFuelsPerStation = total>0
    ? stations.reduce((s,st) => s + (st.fuels||[]).filter(f=>f.available).length, 0) / total
    : 0;
  const noDataCount = stations.filter(s => !(s.fuels||[]).length || (s.fuels||[]).every(f=>!f.available)).length;

  // Data completeness: a station counts as "filled in" per fuel type if
  // that type appears in its fuels array at all (true or false — meaning
  // the user has actually reviewed/toggled it), not just default state.
  let complete = 0, partial = 0, empty = 0;
  stations.forEach(s => {
    const filledCount = (s.fuels||[]).length;
    if (filledCount === 0) empty++;
    else if (filledCount >= FUEL_TYPES_LIST.length) complete++;
    else partial++;
  });

  // Monthly trend from createdAt, last 6 months that have any data
  const monthMap = {};
  stations.forEach(s => {
    if (!s.createdAt) return;
    const d = new Date(s.createdAt);
    if (isNaN(d)) return;
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthMap[key] = (monthMap[key]||0) + 1;
  });
  const trend = Object.entries(monthMap).sort((a,b)=>a[0]<b[0]?-1:1).slice(-6).map(([key,count]) => {
    const [y,m] = key.split('-');
    return { key, label: MONTHS[parseInt(m)-1].slice(0,3)+' '+y.slice(2), count };
  });

  return { total, fuelCounts, uniqueFuelTypesAvailable, avgFuelsPerStation, noDataCount, complete, partial, empty, trend };
}

// Renders a dependency-free location sketch (NOT a real map tile screenshot
// — deliberately avoided due to cross-origin tile loading risks inside a
// PDF export pipeline). Plots each station's lat/lng proportionally inside
// a canvas with a reference grid, north arrow, and numbered pins, returning
// a PNG data URL ready for jsPDF's addImage().
function drawStationSketch(stations, opts) {
  const W = (opts && opts.width)  || 900;
  const H = (opts && opts.height) || 620;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, W, H);

  const pad = 60;
  const plotW = W - pad*2;
  const plotH = H - pad*2 - 40; // leave room for scale bar at bottom

  const valid = stations.filter(s => isFinite(s.lat) && isFinite(s.lng));
  if (valid.length === 0) {
    ctx.fillStyle = '#94A3B8';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Belum ada titik SPBU untuk ditampilkan', W/2, H/2);
    return canvas.toDataURL('image/png');
  }

  let minLat = Math.min(...valid.map(s=>s.lat)), maxLat = Math.max(...valid.map(s=>s.lat));
  let minLng = Math.min(...valid.map(s=>s.lng)), maxLng = Math.max(...valid.map(s=>s.lng));
  // Guard against a degenerate (zero-span) bounding box when all points
  // share the same coordinate, or there's only one station.
  if (maxLat - minLat < 0.002) { const c=(maxLat+minLat)/2; minLat=c-0.01; maxLat=c+0.01; }
  if (maxLng - minLng < 0.002) { const c=(maxLng+minLng)/2; minLng=c-0.01; maxLng=c+0.01; }
  // Add 12% padding around the bounding box so edge points aren't flush
  // against the frame.
  const latPad = (maxLat-minLat)*0.12, lngPad = (maxLng-minLng)*0.12;
  minLat -= latPad; maxLat += latPad; minLng -= lngPad; maxLng += lngPad;

  function project(lat, lng) {
    const x = pad + ((lng - minLng) / (maxLng - minLng)) * plotW;
    const y = pad + (1 - (lat - minLat) / (maxLat - minLat)) * plotH; // lat increases upward
    return [x, y];
  }

  // Frame
  ctx.strokeStyle = '#CED3E3';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(pad, pad, plotW, plotH);

  // Reference grid (5x5) with faint lines
  ctx.strokeStyle = '#E8EBF2';
  ctx.lineWidth = 1;
  for (let i=1; i<5; i++) {
    const gx = pad + (plotW/5)*i;
    ctx.beginPath(); ctx.moveTo(gx, pad); ctx.lineTo(gx, pad+plotH); ctx.stroke();
    const gy = pad + (plotH/5)*i;
    ctx.beginPath(); ctx.moveTo(pad, gy); ctx.lineTo(pad+plotW, gy); ctx.stroke();
  }

  // North arrow (top-right of frame)
  const naX = pad + plotW - 24, naY = pad + 28;
  ctx.strokeStyle = '#546391'; ctx.fillStyle = '#546391'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(naX, naY+18); ctx.lineTo(naX, naY-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(naX, naY-16); ctx.lineTo(naX-6, naY-6); ctx.lineTo(naX+6, naY-6); ctx.closePath(); ctx.fill();
  ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
  ctx.fillText('U', naX, naY+32);

  // Plot points, numbered
  valid.forEach((s, i) => {
    const [x, y] = project(s.lat, s.lng);
    const hasFuel = (s.fuels||[]).some(f=>f.available);
    ctx.fillStyle = hasFuel ? '#00748F' : '#C28A1A';
    ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(i+1), x, y+0.5);
  });
  ctx.textBaseline = 'alphabetic';

  // Approximate scale bar — haversine distance across the full plotted
  // width at the vertical midpoint of the bounding box, then converted to
  // a round-number reference segment.
  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2-lat1) * Math.PI/180, dLng = (lng2-lng1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  const midLat = (minLat+maxLat)/2;
  const fullWidthKm = haversineKm(midLat, minLng, midLat, maxLng);
  const pxPerKm = fullWidthKm > 0 ? plotW / fullWidthKm : 0;
  // Pick a clean round km value that's roughly a quarter of the full width
  const candidates = [0.5,1,2,5,10,20,50,100,200];
  let scaleKm = candidates.find(c => c >= fullWidthKm/4) || candidates[candidates.length-1];
  const scalePx = scaleKm * pxPerKm;

  const sbX = pad, sbY = pad + plotH + 26;
  if (scalePx > 0 && isFinite(scalePx)) {
    ctx.strokeStyle = '#546391'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(sbX, sbY); ctx.lineTo(sbX+scalePx, sbY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sbX, sbY-4); ctx.lineTo(sbX, sbY+4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sbX+scalePx, sbY-4); ctx.lineTo(sbX+scalePx, sbY+4); ctx.stroke();
    ctx.fillStyle = '#546391'; ctx.font = '11px Arial'; ctx.textAlign = 'left';
    ctx.fillText(`~${scaleKm} km`, sbX, sbY+16);
  }
  ctx.fillStyle = '#94A3B8'; ctx.font = '10px Arial'; ctx.textAlign = 'right';
  ctx.fillText('Sketsa posisi relatif — bukan peta tercetak skala presisi', pad+plotW, sbY+16);

  return canvas.toDataURL('image/png');
}

// POM BENSIN — Manual gas station map
// ═══════════════════════════════════════════════════════════
function GasStations({ stations, setStations, showToast }) {
  const mapElRef   = useRef(null);
  const mapRef     = useRef(null);
  const markersRef = useRef({});
  const placingRef = useRef(false);

  const [mapReady, setMapReady]   = useState(false);
  const [placing, setPlacing]     = useState(false);
  const [showForm, setShowForm]   = useState(false);
  const [editing, setEditing]     = useState(null); // station being edited, or null = new
  const [pendingLatLng, setPendingLatLng] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [search, setSearch]       = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [exporting, setExporting] = useState(false);

  const fuelStats = useMemo(() => computeFuelStats(stations), [stations]);

  const blankForm = () => ({ name:"", address:"", lat:"", lng:"", fuels: FUEL_TYPES_LIST.map(f=>({type:f,available:true})), notes:"" });
  const [form, setForm] = useState(blankForm);

  const setMapEl = useCallback((el) => { mapElRef.current = el; }, []);

  // ── Init Leaflet map once ──
  // Guarded against a real-world race condition: the Leaflet CDN script can
  // still be downloading when this component first mounts (e.g. slow
  // connection, or user navigates to this page very quickly after load).
  // Previously this effect ran once with deps:[] and simply gave up if
  // window.L wasn't ready yet, leaving the map permanently blank with no
  // explanation. Now it retries briefly, and surfaces a clear toast if
  // Leaflet genuinely fails to load instead of failing silently.
  useEffect(() => {
    if (mapRef.current) return;
    let cancelled = false;
    let attempts = 0;

    function tryInit() {
      if (cancelled) return;
      if (!window.L) {
        attempts++;
        if (attempts > 40) { // ~10s of retrying at 250ms
          showToast("Gagal memuat peta (Leaflet tidak termuat). Cek koneksi internet lalu refresh halaman.", "error");
          return;
        }
        setTimeout(tryInit, 250);
        return;
      }
      if (!mapElRef.current) {
        // DOM node not attached yet on this tick — retry shortly.
        attempts++;
        if (attempts > 40) return;
        setTimeout(tryInit, 250);
        return;
      }
      try {
        const map = window.L.map(mapElRef.current, {
          center: MAP_DEFAULT_CENTER,
          zoom: MAP_DEFAULT_ZOOM,
          zoomControl: true,
        });
        window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
          subdomains: 'abc',
          maxZoom: 19,
          className: 'fleetos-map-tiles',
        }).addTo(map);

        map.on('click', (e) => {

                background: f.available ? "var(--ok)" : "transparent", border: f.available ? "none" : "1px solid var(--border-12)" } },
                f.available && React.createElement(Icon, { d:IC.check, size:10, stroke:"var(--accent-on)", sw:3 })
              ),
              React.createElement("span", { style:{ fontSize:12, color: f.available ? "var(--t1)" : "var(--t4)", fontWeight: f.available ? 600 : 400 } }, f.type)

// ═══════════════════════════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════════════════════════
function Reports({ claims, kantong, showToast }) {
  const now = new Date();

  const [filterMode, setFilterMode] = useState("month");
  const [selYear,    setSelYear]    = useState(now.getFullYear());
  const [selMonth,   setSelMonth]   = useState(now.getMonth());
  const [dateFrom,   setDateFrom]   = useState(now.toISOString().slice(0,8) + "01");
  const [dateTo,     setDateTo]     = useState(now.toISOString().slice(0,10));

  const [generated,  setGenerated]  = useState(false);
  const [report,     setReport]     = useState(null);
  const [downloading,setDownloading]= useState(false);
  const [activeTab,  setActiveTab]  = useState("claim");

  const filterClaims = () => {
    if (filterMode === "month") {
      return claims.filter(c => {
        const d = new Date(c.date);
        return d.getFullYear() === selYear && d.getMonth() === selMonth;
      });
    } else {
      const from = new Date(dateFrom); from.setHours(0,0,0,0);
      const to   = new Date(dateTo);   to.setHours(23,59,59,999);
      return claims.filter(c => { const d = new Date(c.date); return d >= from && d <= to; });
    }
  };

  const periodLabel = filterMode === "month"
    ? `${MONTHS[selMonth]} ${selYear}`
    : `${fmtDate(dateFrom)} – ${fmtDate(dateTo)}`;

  const buildReport = () => {
    const monthClaims = filterClaims();
    if (monthClaims.length === 0) return { empty: true, monthClaims: [] };

    const reportYear  = filterMode === "month" ? selYear  : new Date(dateFrom).getFullYear();
    const reportMonth = filterMode === "month" ? selMonth : new Date(dateFrom).getMonth();

    const weekMap = {};
    monthClaims.forEach(c => {
      const w     = getWeekOfMonth(c.date);
      const types = getClaimTypes(c);
      const total = getClaimTotal(c);
      if (!weekMap[w]) weekMap[w] = { week: w, claims: [], total: 0, drivers: new Set(), typeMap: {} };
      weekMap[w].claims.push(c);
      weekMap[w].total += total;
      weekMap[w].drivers.add(getClaimDriver(c));
      types.forEach(t => { weekMap[w].typeMap[t] = (weekMap[w].typeMap[t] || 0) + 1; });
    });
    const weeks = Object.values(weekMap).sort((a,b) => a.week - b.week).map(w => {
      const topTypeEntry = Object.entries(w.typeMap).sort((a,b) => b[1]-a[1])[0];
      return { ...w, drivers: w.drivers.size, topType: topTypeEntry ? topTypeEntry[0] : "—" };
    });

    const driverMap = {};
    monthClaims.forEach(c => {
      const d     = getClaimDriver(c);
      const total = getClaimTotal(c);
      const types = getClaimTypes(c);
      if (!driverMap[d]) driverMap[d] = { driver: d, total: 0, count: 0, typeMap: {}, weeks: new Set() };
      driverMap[d].total += total;
      driverMap[d].count++;
      types.forEach(t => { driverMap[d].typeMap[t] = (driverMap[d].typeMap[t] || 0) + 1; });
      driverMap[d].weeks.add(getWeekOfMonth(c.date));
    });
    const byDriver = Object.values(driverMap).sort((a,b) => b.total - a.total).map(d => {
      const topTypeEntry = Object.entries(d.typeMap).sort((a,b) => b[1]-a[1])[0];
      return { ...d, weeks: d.weeks.size, topType: topTypeEntry ? topTypeEntry[0] : "—" };
    });

    const typeMap = {};
    monthClaims.forEach(c => {
      getClaimItems(c).forEach(item => {
        const t = item.type || "Other";
        const v = Number(item.total) || 0;
        if (!typeMap[t]) typeMap[t] = { type: t, total: 0, count: 0 };
        typeMap[t].total += v;
        typeMap[t].count++;
      });
    });
    const byType = Object.values(typeMap).sort((a,b) => b.total - a.total);

    const grand       = monthClaims.reduce((s,c) => s + getClaimTotal(c), 0);
    const avgPerWeek  = weeks.length  ? Math.round(grand / weeks.length)       : 0;
    const topDriver   = byDriver[0] || null;
    const topType     = byType[0]   || null;
    const topWeek     = [...weeks].sort((a,b) => b.total - a.total)[0] || null;

    const insights = [];
    if (topDriver) insights.push(`Driver paling aktif: ${topDriver.driver} dengan ${topDriver.count} claim senilai Rp ${fmt(topDriver.total)}`);
    if (topType)   insights.push(`Jenis claim terbesar: ${topType.type} (${topType.count}x, ${grand > 0 ? (topType.total/grand*100).toFixed(1) : 0}% dari total)`);
    if (topWeek)   insights.push(`Minggu tertinggi: Minggu ${topWeek.week} — Rp ${fmt(topWeek.total)} (${topWeek.claims.length} claim)`);

    const half      = Math.ceil(weeks.length / 2);
    const firstHalf = weeks.slice(0, half).reduce((s,w) => s + w.total, 0);
    const secHalf   = weeks.slice(half).reduce((s,w) => s + w.total, 0);
    if (weeks.length >= 2) {
      if      (secHalf > firstHalf * 1.1) insights.push(`Tren: pengeluaran meningkat di paruh kedua periode (+${((secHalf-firstHalf)/Math.max(firstHalf,1)*100).toFixed(0)}%)`);
      else if (secHalf < firstHalf * 0.9) insights.push(`Tren: pengeluaran menurun di paruh kedua periode (-${((firstHalf-secHalf)/Math.max(firstHalf,1)*100).toFixed(0)}%)`);
      else                                insights.push(`Tren: pengeluaran relatif stabil sepanjang periode`);
    }
    if (byDriver.length > 1) {
      const avg = grand / byDriver.length;
      const hs  = byDriver.filter(d => d.total > avg * 1.5);
      if (hs.length) insights.push(`Driver di atas rata-rata pengeluaran: ${hs.map(d=>d.driver).join(", ")}`);
    }

    let cashflowData = null;
    if (kantong) {
      const totalBudget    = kantong.totalBudget    || 0;
      const allocOpDriver  = kantong.allocOpDriver  || 0;
      const allocEmergency = kantong.allocEmergency || 0;
      const cashAvailable  = kantong.cashAvailable  || 0;
      const claimSubmitted = kantong.claimSubmitted || 0;
      const claimPaid      = kantong.claimPaid      || 0;
      const totalAlokasi   = allocOpDriver + allocEmergency;
      const outstanding    = totalAlokasi + cashAvailable + claimSubmitted + claimPaid;
      cashflowData = { totalBudget, allocOpDriver, allocEmergency, totalAlokasi, cashAvailable, claimSubmitted, claimPaid, outstanding, gap: outstanding - totalBudget };
    }

    return { monthClaims, weeks, byDriver, byType, grand, avgPerWeek, topDriver, topType, topWeek, insights, cashflowData, _reportYear: reportYear, _reportMonth: reportMonth };
  };

  const generate = () => { setReport(buildReport()); setGenerated(true); };
  const refresh  = () => { setReport(buildReport()); };

  const downloadCSV = () => {
    if (!report || report.empty) return;
    const rows = [["Minggu","Tanggal","Driver","Jenis","Rincian","Nominal","Status"]];
    [...report.monthClaims].sort((a,b) => new Date(a.date)-new Date(b.date)).forEach(c => {
      const items  = getClaimItems(c);
      const driver = getClaimDriver(c);
      const week   = getWeekOfMonth(c.date);
      items.forEach(item => rows.push([`Minggu ${week}`, fmtDate(c.date), driver, item.type||"", item.expr||"", item.total||0, c.status]));
    });
    const csv  = rows.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `FleetOS_Report_${periodLabel.replace(/\s/g,"_")}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  // ── PDF — jsPDF + autoTable, fleet-style landscape layout ──────────────
  const downloadPDF = () => {
    if (!report || report.empty || downloading) return;
    setDownloading(true);
    try {
      const now = new Date();
      const dateStr = now.toLocaleDateString("id-ID",{day:"2-digit",month:"2-digit",year:"numeric"});
      const timeStr = now.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"}).replace(":",".");
      const pdf = makeFleetPDF({
        title: "FLEET OPERATIONS — FleetOS",
        subtitle: "Laporan Komprehensif Claim Kendaraan",
        metaRight1: "Periode " + periodLabel,
        metaRight2: "Dibuat " + dateStr + ", " + timeStr,
        footerLeft: "FleetOS  ·  Vehicle Claim Report  ·  Confidential",
      });
      if (!pdf) { showToast("Library PDF gagal dimuat","error"); setDownloading(false); return; }
      const { doc, C, ML, MR, CW, drawPageHeader, drawPageFooter, needY, secLbl, drawStatCards, periodBar } = pdf;
      const r = report;

      drawPageHeader();
      periodBar(periodLabel, `${r.weeks.length} minggu kerja`);

      secLbl("Claim Overview");
      drawStatCards(
        [ {lbl:"Total Pengeluaran", val:"Rp "+fmt(r.grand), sub:"Periode ini"},
          {lbl:"Total Transaksi", val:String(r.monthClaims.length), sub:"Jumlah claim"},
          {lbl:"Rata-rata/Minggu", val:"Rp "+fmt(r.avgPerWeek), sub:"Per minggu"},
          {lbl:"Jenis Terbesar", val:r.topType?.type||"—", sub:"Kategori claim"} ],
        [C.blue, C.green, C.orange, C.purple]
      );

      needY(20);
      secLbl("Analisa & Insight");
      doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(C.txt1[0],C.txt1[1],C.txt1[2]);
      r.insights.forEach(ins => {
        needY(7);
        pdf.sf(C.blue); doc.circle(ML+1.5, pdf.Y-1.5, 0.7, 'F');
        const lines = doc.splitTextToSize(ins, CW-10);
        doc.text(lines, ML+6, pdf.Y);
        pdf.Y += lines.length*4.2 + 2;
      });
      pdf.Y += 4;

      // Weekly table
      needY(18);
      secLbl("Rincian Per Minggu");
      doc.autoTable({
        startY: pdf.Y,
        margin: {left:ML, right:MR},
        theme: "grid",
        styles: { fontSize:8, cellPadding:3, textColor:C.txt1, lineColor:C.border, lineWidth:0.2 },
        headStyles: { fillColor:C.navy, textColor:255, fontStyle:"bold", fontSize:7.5, halign:"center" },
        alternateRowStyles: { fillColor:[248,249,253] },
        columnStyles: { 0:{halign:"left",fontStyle:"bold"}, 1:{halign:"left"}, 2:{halign:"center"}, 3:{halign:"center"}, 4:{halign:"left"}, 5:{halign:"right",fontStyle:"bold"}, 6:{halign:"right"} },
        head: [["Minggu","Periode","Transaksi","Driver","Jenis Terbanyak","Total","% Bulan"]],
        body: r.weeks.map(w => [
          `Minggu ${w.week}`,
          filterMode==="month" ? weekLabel(w.week, r._reportYear, r._reportMonth) : "",
          `${w.claims.length}x`, String(w.drivers), w.topType,
          "Rp "+fmt(w.total), `${r.grand>0?(w.total/r.grand*100).toFixed(1):0}%`
        ]),
        foot: [[ "TOTAL", "", `${r.monthClaims.length}x`, String([...new Set(r.monthClaims.map(c=>getClaimDriver(c)))].length), "", "Rp "+fmt(r.grand), "100%" ]],
        footStyles: { fillColor:C.periodBg, textColor:C.navy, fontStyle:"bold", fontSize:8 },
        willDrawPage: drawPageFooter,
      });
      pdf.Y = doc.lastAutoTable.finalY + 8;

      // Per driver table
      needY(18);
      secLbl("Per Driver");
      doc.autoTable({
        startY: pdf.Y,
        margin: {left:ML, right:MR},
        theme: "grid",
        styles: { fontSize:8, cellPadding:3, textColor:C.txt1, lineColor:C.border, lineWidth:0.2 },
        headStyles: { fillColor:C.navy, textColor:255, fontStyle:"bold", fontSize:7.5, halign:"center" },
        alternateRowStyles: { fillColor:[248,249,253] },
        columnStyles: { 0:{halign:"left",fontStyle:"bold"}, 1:{halign:"center"}, 2:{halign:"center"}, 3:{halign:"left"}, 4:{halign:"right",fontStyle:"bold"}, 5:{halign:"right"} },
        head: [["Driver","Claim","Minggu Aktif","Jenis Utama","Total","%"]],
        body: r.byDriver.map(d => [d.driver, `${d.count}x`, `${d.weeks}`, d.topType, "Rp "+fmt(d.total), `${r.grand>0?(d.total/r.grand*100).toFixed(1):0}%`]),
        willDrawPage: drawPageFooter,
      });
      pdf.Y = doc.lastAutoTable.finalY + 8;

      // Per type table
      needY(18);
      secLbl("Per Jenis Claim");
      doc.autoTable({
        startY: pdf.Y,
        margin: {left:ML, right:MR},
        theme: "grid",
        styles: { fontSize:8, cellPadding:3, textColor:C.txt1, lineColor:C.border, lineWidth:0.2 },
        headStyles: { fillColor:C.navy, textColor:255, fontStyle:"bold", fontSize:7.5, halign:"center" },
        alternateRowStyles: { fillColor:[248,249,253] },
        columnStyles: { 0:{halign:"left",fontStyle:"bold"}, 1:{halign:"center"}, 2:{halign:"right",fontStyle:"bold"}, 3:{halign:"right"} },
        head: [["Jenis","Frekuensi","Total","%"]],
        body: r.byType.map(t => [t.type, `${t.count}x`, "Rp "+fmt(t.total), `${r.grand>0?(t.total/r.grand*100).toFixed(1):0}%`]),
        willDrawPage: drawPageFooter,
      });
      pdf.Y = doc.lastAutoTable.finalY + 8;

      // Detail table
      needY(18);
      secLbl("Detail Transaksi");
      const detailRows = [];
      [...r.monthClaims].sort((a,b) => new Date(a.date)-new Date(b.date)).forEach(c => {
        const items = getClaimItems(c);
        const driver = getClaimDriver(c);
        items.forEach((item,idx) => detailRows.push([
          idx===0 ? fmtDate(c.date) : "", idx===0 ? driver : "",
          item.type||"", item.expr||"", "Rp "+fmt(item.total||0)
        ]));
      });
      doc.autoTable({
        startY: pdf.Y,
        margin: {left:ML, right:MR},
        theme: "grid",
        styles: { fontSize:7.8, cellPadding:2.6, textColor:C.txt1, lineColor:C.border, lineWidth:0.2 },
        headStyles: { fillColor:C.navy, textColor:255, fontStyle:"bold", fontSize:7.5, halign:"center" },
        alternateRowStyles: { fillColor:[248,249,253] },
        columnStyles: { 0:{halign:"left",cellWidth:26}, 1:{halign:"left",cellWidth:40}, 2:{halign:"left",cellWidth:30}, 3:{halign:"left"}, 4:{halign:"right",fontStyle:"bold",cellWidth:32} },
        head: [["Tanggal","Driver","Jenis","Rincian","Nominal"]],
        body: detailRows,
        foot: [[ "", "", "", "GRAND TOTAL", "Rp "+fmt(r.grand) ]],
        footStyles: { fillColor:C.periodBg, textColor:C.navy, fontStyle:"bold", fontSize:8.5 },
        willDrawPage: drawPageFooter,
      });
      pdf.Y = doc.lastAutoTable.finalY + 8;

      // Cashflow section if available
      if (r.cashflowData) {
        const cf = r.cashflowData;
        needY(18);
        doc.addPage(); drawPageHeader();
        secLbl("Dana Operasional");
        doc.autoTable({
          startY: pdf.Y,
          margin: {left:ML, right:MR},
          theme: "grid",
          styles: { fontSize:8.5, cellPadding:3.2, textColor:C.txt1, lineColor:C.border, lineWidth:0.2 },
          headStyles: { fillColor:C.navy, textColor:255, fontStyle:"bold", fontSize:8, halign:"left" },
          columnStyles: { 0:{halign:"left",fontStyle:"bold",cellWidth:70}, 1:{halign:"right",fontStyle:"bold",cellWidth:50}, 2:{halign:"left"} },
          head: [["Pos","Nilai","Keterangan"]],
          body: [
            ["Total Cash Operational (A)", "Rp "+fmt(cf.totalBudget), "Total dana tersedia"],
            ["Op Driver (A1)", "Rp "+fmt(cf.allocOpDriver), "Alokasi"],
            ["Emergency (A2)", "Rp "+fmt(cf.allocEmergency), "Alokasi"],
            ["Total Alokasi (A3)", "Rp "+fmt(cf.totalAlokasi), "A1 + A2"],
            ["Cash Available (A4)", "Rp "+fmt(cf.cashAvailable), "Kas tersedia"],
            ["Claim Diajukan (A5)", "Rp "+fmt(cf.claimSubmitted), "Diajukan ke Finance"],
            ["Claim Dibayar (A6)", "Rp "+fmt(cf.claimPaid), "Sudah dibayar Finance"],
          ],
          foot: [[ "Outstanding (B) = A3+A4+A5+A6", "Rp "+fmt(cf.outstanding), `GAP (B-A): ${cf.gap>=0?"+":""}Rp ${fmt(cf.gap)}` ]],
          footStyles: { fillColor:C.navy, textColor:255, fontStyle:"bold", fontSize:9 },
          willDrawPage: drawPageFooter,
        });
        pdf.Y = doc.lastAutoTable.finalY + 8;
      }

      drawPageFooter();
      doc.save(`FleetOS_Report_${periodLabel.replace(/\s/g,"_")}.pdf`);
      setDownloading(false);
    } catch (err) {
      console.error("downloadPDF error:", err);
      showToast("Gagal membuat PDF: " + err.message, "error");
      setDownloading(false);
    }
  };


  const r = report;

  return React.createElement("div", null,
    React.createElement("div", { className:"card", style:{ padding:"16px 18px", marginBottom:18 } },
      React.createElement("div", { style:{ display:"flex", gap:7, marginBottom:13 } },
        ["month","range"].map(mode =>
          React.createElement("button", { key:mode, className:"btn",
            onClick: () => { setFilterMode(mode); setGenerated(false); setReport(null); },
