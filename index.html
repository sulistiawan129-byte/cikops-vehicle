// All requests use GET to avoid CORS preflight
async function gasCall(action, payload) {
  if (!GAS_URL) return null;
  try {
    const url = GAS_URL + "?action=" + encodeURIComponent(action) + (payload ? "&payload=" + encodeURIComponent(JSON.stringify(payload)) : "");
    const res = await fetch(url);
    const json = await res.json();
    if (!json.ok) { console.error("GAS error:", json.error); return null; }
    return json.data;
  } catch(e) { console.error("GAS call error [" + action + "]:", e); return null; }
}
const gasGet  = (action)          => gasCall(action, null);
const gasPost = (action, payload) => gasCall(action, payload);
async function syncToGAS(action, payload) {
  if (!GAS_URL) return;
  gasCall(action, payload).catch(e => console.error("Sync bg error:", e));
}

const fmt      = n  => new Intl.NumberFormat("id-ID").format(Math.round(n || 0));
const fmtDate  = d  => d ? new Date(d).toLocaleDateString("id-ID",{day:"2-digit",month:"short",year:"numeric"}) : "-";
const daysUntil = d => { if(!d) return 999; return Math.ceil((new Date(d)-new Date())/86400000); };
const urgCol   = d  => d<=7?"#EF4444":d<=30?"#F59E0B":"#10B981";
const evalExpr = raw => {
  const c = (raw||"").replace(/[^0-9+\-*/().\s]/g,"");
  if (!c.trim()) return null;
  try { const v = Function('"use strict";return ('+c+')')(); return isFinite(v)&&v>=0 ? Math.round(v) : null; }
  catch(e) { return null; }
};
// Safely get driver name from a claim — handles both old and new formats
const getClaimDriver = c => c.driverName || c.driver || "";
// Safely get all item types from a claim — handles both old (single type) and new (items array) formats
const getClaimItems = c => {
  if (Array.isArray(c.items) && c.items.length > 0) return c.items;
  if (c.type) return [{type:c.type, expr:c.expr||"", total:Number(c.total)||0}];
  return [];
};
const getClaimTypes = c => {
  const items = getClaimItems(c);
  const fromItems = [...new Set(items.map(i=>i.type).filter(Boolean))];
  if (fromItems.length > 0) return fromItems;
  if (c.types) return String(c.types).split(",").map(s=>s.trim()).filter(Boolean);
  if (c.type)  return [c.type];
  return [];
};
// Week of month (1-indexed) - robust version
const getWeekOfMonth = dateStr => {
  const d = new Date(dateStr);
  if (isNaN(d)) return 1;
  const firstDay = new Date(d.getFullYear(), d.getMonth(), 1).getDay();
  return Math.ceil((d.getDate() + firstDay) / 7);
};

// Build real notifications from live data — no demo/fake entries.
// Sources: vehicle document expiry (KIR/Service/STNK), fuel price increases, Dana Operasional low balance.
const buildNotifs = (vehicles, bbm, kantong) => {
  const out = [];
  let idCounter = 1;

  (vehicles||[]).forEach(v => {
    [["KIR", v.kir], ["Service", v.service], ["STNK", v.stnk]].forEach(([label, date]) => {
      const days = daysUntil(date);
      if (days <= 30) {
        out.push({
          id: `doc-${v.id}-${label}`,
          type: days <= 7 ? "warning" : "info",
          title: `${label} ${days <= 0 ? "Sudah Lewat" : "Reminder"} — ${v.plate}`,
          msg: days <= 0
            ? `${label} ${v.type || ""} (${v.plate}) sudah melewati tanggal ${fmtDate(date)}.`
            : `${label} ${v.type || ""} (${v.plate}) habis dalam ${days} hari (${fmtDate(date)}). Siapkan berkas!`,
          sortKey: days,
        });
      }
    });
  });

  Object.entries(bbm||{}).forEach(([name, hist]) => {
    if (Array.isArray(hist) && hist.length >= 2 && hist[0].price > hist[1].price) {
      const pct = ((hist[0].price - hist[1].price) / hist[1].price * 100).toFixed(1);
      out.push({
        id: `fuel-${name}`,
        type: "warning",
        title: `Kenaikan Harga BBM — ${name}`,
        msg: `Harga ${name} naik ${pct}% menjadi Rp ${fmt(hist[0].price)}/L (${fmtDate(hist[0].date)}).`,
        sortKey: -1,
      });
    }
  });

  if (kantong) {
    const totalAlokasi = (kantong.allocOpDriver||0) + (kantong.allocEmergency||0);
    const outstanding  = totalAlokasi + (kantong.cashAvailable||0) + (kantong.claimSubmitted||0) + (kantong.claimPaid||0);
    const gap = outstanding - (kantong.totalBudget||0);
    if (gap > 0) {
      out.push({
        id: "opfund-gap-over",
        type: "warning",
        title: "Dana Operasional GAP Positif",
        msg: `Outstanding cash operational melebihi total dana sebesar Rp ${fmt(gap)}. Perlu pengecekan.`,
        sortKey: -2,
      });
    } else if (gap < 0) {
      out.push({
        id: "opfund-gap-under",
        type: "info",
        title: "Dana Operasional Belum Terpakai Penuh",
        msg: `Outstanding cash operational masih Rp ${fmt(Math.abs(gap))} di bawah total dana.`,
        sortKey: -1,
      });
    }
  }

  return out.sort((a,b) => a.sortKey - b.sortKey).map(n => ({ ...n, read:false }));
};

// Simple bar chart SVG
function MiniBarChart({data, color="#00D4FF", height=60}) {
  if (!data || data.length === 0) return null;
  const max = Math.max(...data.map(d=>d.value),1);
  const w = 100 / data.length;
  return React.createElement("svg",{width:"100%",height,viewBox:`0 0 ${data.length*20} ${height}`,preserveAspectRatio:"none",style:{display:"block"}},
    data.map((d,i) => {

      const y = height - barH;
      return React.createElement("rect",{key:i,x,y,width:barW,height:barH,fill:color,opacity:0.7,rx:2});
    })
  );
}

    const d = {...form,year:parseInt(form.year)||2024,odometer:parseInt(form.odometer)||0};

  const fuelTypes  = Object.keys(bbm||{});
  const curPrice   = name => bbm[name]?.[0]?.price||0;
  const prevPrice  = name => bbm[name]?.[1]?.price||0;
  const changePct  = name => { const c=curPrice(name),p=prevPrice(name); return p?((c-p)/p*100).toFixed(1):null; };
  const gasClaims  = claims.filter(c=>getClaimTypes(c).includes("Gasoline"));
  const byVehicle  = vehicles.map(v=>{
    const total = gasClaims.filter(c=>String(c.vehicleId)===String(v.id)).reduce((s,c)=>s+(c.total||0),0);

    const liters = cPrice>0?total/cPrice:0;

    const p = evalExpr(newPrice);

    setBbm(updatedBBM); showToast(`Harga ${selFuel} diperbarui!`); setShowAdd(false); setNewPrice("");
    const bbmEntries = [];
    Object.entries(updatedBBM).forEach(([ft,hist])=>hist.forEach(h=>bbmEntries.push({fuelType:ft,price:h.price,date:h.date})));
    syncToGAS("saveBBM",{entries:bbmEntries});
  };
  return React.createElement("div",null,
    React.createElement("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:18}},
      React.createElement("button",{className:"btn btn-p",onClick:()=>setShowAdd(true)},React.createElement(Icon,{d:IC.plus,size:15,stroke:"#0A0E1A"}),"Update Harga BBM")

        const col=FUEL_COL[name]||"#00D4FF";
        return React.createElement("div",{key:name,className:"glass",style:{padding:18,position:"relative",overflow:"hidden",border:`1px solid ${col}25`}},
          React.createElement("div",{style:{position:"absolute",top:0,left:0,right:0,height:3,background:col}}),
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}},
            React.createElement("div",{style:{width:36,height:36,borderRadius:10,background:col+"18",display:"flex",alignItems:"center",justifyContent:"center"}},React.createElement(Icon,{d:IC.droplet,size:18,stroke:col})),
            pct && React.createElement("span",{style:{fontSize:12,fontWeight:700,color:up?"#EF4444":"#10B981",background:up?"rgba(239,68,68,0.12)":"rgba(16,185,129,0.12)",padding:"3px 8px",borderRadius:20}},up?"+":"",pct,"%")
          ),
          React.createElement("div",{style:{fontSize:12,color:"#6B7280",marginBottom:4}},name),
          React.createElement("div",{style:{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:22,color:"#F1F5F9"}},"Rp ",fmt(cur),React.createElement("span",{style:{fontSize:13,fontWeight:400,color:"#6B7280"}},"/L")),
          prv>0 && React.createElement("div",{style:{fontSize:11,color:"#4B5563",marginTop:4}},"Sebelumnya: Rp ",fmt(prv),"/L"),
          React.createElement("div",{style:{fontSize:10,color:"#374151",marginTop:6}},"Update: ",fmtDate(bbm[name]?.[0]?.date))
        );
      })
    ),
    React.createElement("div",{className:"glass",style:{padding:20,marginBottom:20}},
      React.createElement("h3",{style:{fontFamily:"'Space Grotesk',sans-serif",fontWeight:600,fontSize:15,marginBottom:16}},"Konsumsi BBM per Kendaraan"),

          React.createElement("thead",null,React.createElement("tr",{style:{borderBottom:"1px solid rgba(255,255,255,0.07)"}},
            ["Kendaraan","Jenis BBM","Harga/Liter","Total Claim BBM","Est. Liter","Cost/km","Transaksi"].map(h=>React.createElement("th",{key:h,style:{padding:"11px 14px",textAlign:"left",fontSize:11,fontWeight:600,color:"#4B5563",whiteSpace:"nowrap"}},h))

              React.createElement("td",{style:{padding:"12px 14px"}},React.createElement("div",{style:{fontSize:13,fontWeight:600,color:"#E2E8F0"}},v.plate),React.createElement("div",{style:{fontSize:11,color:"#4B5563"}},v.type)),
              React.createElement("td",{style:{padding:"12px 14px"}},React.createElement("span",{className:"tag",style:{background:col+"18",color:col}},v.fuel)),

    showAdd && React.createElement("div",{className:"overlay",onClick:e=>e.target===e.currentTarget&&setShowAdd(false)},
      React.createElement("div",{className:"modal",style:{maxWidth:400}},

          React.createElement("h2",{style:{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:17}},"Update Harga BBM"),
          React.createElement("button",{className:"btn btn-s btn-sm",style:{padding:"6px 9px"},onClick:()=>setShowAdd(false)},React.createElement(Icon,{d:IC.x,size:15}))
        ),
        React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:14}},
          React.createElement("div",null,

            React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}},
              fuelTypes.map(f=>{const col=FUEL_COL[f]||"#00D4FF";return React.createElement("button",{key:f,className:"btn",onClick:()=>setSelFuel(f),style:{padding:"9px 8px",fontSize:12,justifyContent:"center",background:selFuel===f?col+"20":"rgba(255,255,255,0.04)",border:`1px solid ${selFuel===f?col:"rgba(255,255,255,0.08)"}`,color:selFuel===f?col:"#9CA3AF",borderRadius:9}},f);})
            )
          ),
          React.createElement("div",null,
            React.createElement("label",{style:{fontSize:11,color:"#6B7280",fontWeight:600,display:"block",marginBottom:6}},"TANGGAL BERLAKU"),
            React.createElement("input",{type:"date",className:"inp",value:newDate,onChange:e=>setNewDate(e.target.value)})
          ),
          React.createElement("div",null,
            React.createElement("label",{style:{fontSize:11,color:"#6B7280",fontWeight:600,display:"block",marginBottom:6}},"HARGA BARU (Rp/Liter)"),
            React.createElement(ExprInput,{value:newPrice,onChange:setNewPrice,placeholder:"mis: 10500"})
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:9,marginTop:22}},
          React.createElement("button",{className:"btn btn-s",style:{flex:1},onClick:()=>setShowAdd(false)},"Batal"),
          React.createElement("button",{className:"btn btn-p",style:{flex:1},onClick:addPrice},React.createElement(Icon,{d:IC.check,size:15,stroke:"#0A0E1A"}),"Simpan")
        )
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════
// REPORTS  ← HEAVILY FIXED + NEW FEATURES
// ═══════════════════════════════════════════════════════════
// ── REPORTS (FIXED + NEW FEATURES) ────────────────────────────────────────────
function Reports({ claims, vehicles, showToast, kantong }) {
  const now = new Date();

  // ── Filter mode: "month" or "range" ──────────────────────────
  const [filterMode, setFilterMode] = React.useState("month");
  const [selYear,    setSelYear]    = React.useState(now.getFullYear());
  const [selMonth,   setSelMonth]   = React.useState(now.getMonth());
  const [dateFrom,   setDateFrom]   = React.useState(now.toISOString().slice(0,8) + "01");
  const [dateTo,     setDateTo]     = React.useState(now.toISOString().slice(0,10));

  const [generated,  setGenerated]  = React.useState(false);
  const [report,     setReport]     = React.useState(null);
  const [downloading,setDownloading]= React.useState(false);
  const [activeTab,  setActiveTab]  = React.useState("claim"); // "claim" | "cashflow"

  const MONTHS = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const COLS   = ["#00D4FF","#7B2FBE","#10B981","#F59E0B","#EF4444","#EC4899"];

  // ── Claim helpers (support old + new format) ─────────────────
  const getClaimDriver = (c) => c.driverName || c.driver || "";

  const getClaimItems = (c) => {
    if (Array.isArray(c.items) && c.items.length > 0) return c.items;
    // Legacy single-item
    if (c.type) return [{ type: c.type, expr: c.expr || "", total: Number(c.total) || 0 }];
    return [];
  };

  const getClaimTypes = (c) => {
    const items = getClaimItems(c);
    const fromItems = [...new Set(items.map(i => i.type).filter(Boolean))];
    if (fromItems.length > 0) return fromItems;
    if (c.types) return String(c.types).split(",").map(s => s.trim()).filter(Boolean);
    if (c.type)  return [c.type];
    return [];
  };

  const getClaimTotal = (c) => Number(c.total) || 0;

  // ── Week helpers ──────────────────────────────────────────────
  const getWeekOfMonth = (dateStr) => {
    const d     = new Date(dateStr);
    const first = new Date(d.getFullYear(), d.getMonth(), 1);
    const startDay = first.getDay() === 0 ? 6 : first.getDay() - 1; // Mon-based
    return Math.floor((d.getDate() + startDay - 1) / 7) + 1;
  };

  const weekLabel = (w, year, month) => {
    const monthStart = new Date(year, month, 1);
    const startDay   = monthStart.getDay() === 0 ? 6 : monthStart.getDay() - 1;
    const wkStart    = new Date(year, month, 1 + (w - 1) * 7 - startDay);
    const wkEnd      = new Date(wkStart); wkEnd.setDate(wkStart.getDate() + 6);
    const fmt2 = d => d.toLocaleDateString("id-ID", { day:"2-digit", month:"short" });
    return `${fmt2(wkStart)} – ${fmt2(wkEnd)}`;
  };

  // ── Filter claims by selected period ─────────────────────────
  const filterClaims = () => {
    if (filterMode === "month") {
      return claims.filter(c => {
        const d = new Date(c.date);
        return d.getFullYear() === selYear && d.getMonth() === selMonth;
      });
    } else {
      const from = new Date(dateFrom); from.setHours(0,0,0,0);
      const to   = new Date(dateTo);   to.setHours(23,59,59,999);
      return claims.filter(c => {
        const d = new Date(c.date);
        return d >= from && d <= to;
      });
    }
  };

  const periodLabel = filterMode === "month"
    ? `${MONTHS[selMonth]} ${selYear}`
    : `${fmtDate(dateFrom)} – ${fmtDate(dateTo)}`;

  // ── Build report ──────────────────────────────────────────────
  const buildReport = () => {
    const monthClaims = filterClaims();
    if (monthClaims.length === 0) return { empty: true, monthClaims: [] };

    const reportYear  = filterMode === "month" ? selYear  : new Date(dateFrom).getFullYear();
    const reportMonth = filterMode === "month" ? selMonth : new Date(dateFrom).getMonth();

    // ── Weekly breakdown ──────────────────────────────────────
    const weekMap = {};
    monthClaims.forEach(c => {
      const w     = getWeekOfMonth(c.date);
      const items = getClaimItems(c);
      const types = getClaimTypes(c);
      const total = getClaimTotal(c);

      if (!weekMap[w]) weekMap[w] = { week: w, claims: [], total: 0, drivers: new Set(), typeMap: {} };
      weekMap[w].claims.push(c);
      weekMap[w].total += total;
      weekMap[w].drivers.add(getClaimDriver(c));
      // Count by type using items
      types.forEach(t => { weekMap[w].typeMap[t] = (weekMap[w].typeMap[t] || 0) + 1; });
    });

    const weeks = Object.values(weekMap).sort((a,b) => a.week - b.week).map(w => {
      const topTypeEntry = Object.entries(w.typeMap).sort((a,b) => b[1]-a[1])[0];
      return {
        ...w,
        drivers: w.drivers.size,
        topType: topTypeEntry ? topTypeEntry[0] : "—",
        _reportYear: reportYear,
        _reportMonth: reportMonth,
      };
    });

    // ── Per driver ────────────────────────────────────────────
    const driverMap = {};
    monthClaims.forEach(c => {
      const d     = getClaimDriver(c);
      const total = getClaimTotal(c);
      const types = getClaimTypes(c);
      if (!driverMap[d]) driverMap[d] = { driver: d, total: 0, count: 0, typeMap: {}, weeks: new Set() };
      driverMap[d].total += total;
      driverMap[d].count++;
      types.forEach(t => { driverMap[d].typeMap[t] = (driverMap[d].typeMap[t] || 0) + 1; });
      driverMap[d].weeks.add(getWeekOfMonth(c.date));
    });

    const byDriver = Object.values(driverMap).sort((a,b) => b.total - a.total).map(d => {
      const topTypeEntry = Object.entries(d.typeMap).sort((a,b) => b[1]-a[1])[0];
      return { ...d, weeks: d.weeks.size, topType: topTypeEntry ? topTypeEntry[0] : "—" };
    });

    // ── Per type (from items, not c.type) ─────────────────────
    const typeMap = {};
    monthClaims.forEach(c => {
      const items = getClaimItems(c);
      items.forEach(item => {
        const t = item.type || "Other";
        const v = Number(item.total) || 0;
        if (!typeMap[t]) typeMap[t] = { type: t, total: 0, count: 0 };
        typeMap[t].total += v;
        typeMap[t].count++;
      });
    });
    const byType = Object.values(typeMap).sort((a,b) => b.total - a.total);

    // ── Totals ────────────────────────────────────────────────
    const grand       = monthClaims.reduce((s,c) => s + getClaimTotal(c), 0);
    const avgPerWeek  = weeks.length  ? Math.round(grand / weeks.length)       : 0;
    const avgPerClaim = monthClaims.length ? Math.round(grand / monthClaims.length) : 0;
    const topDriver   = byDriver[0] || null;
    const topType     = byType[0]   || null;
    const topWeek     = [...weeks].sort((a,b) => b.total - a.total)[0] || null;

    // ── Insights ──────────────────────────────────────────────
    const insights = [];
    if (topDriver) insights.push(`🏆 Driver paling aktif: <b>${topDriver.driver}</b> dengan ${topDriver.count} claim senilai <b>Rp ${fmt(topDriver.total)}</b>`);
    if (topType)   insights.push(`📋 Jenis claim terbesar: <b>${topType.type}</b> (${topType.count}x, ${grand > 0 ? (topType.total/grand*100).toFixed(1) : 0}% dari total)`);
    if (topWeek)   insights.push(`📈 Minggu tertinggi: <b>Minggu ${topWeek.week}</b> — Rp ${fmt(topWeek.total)} (${topWeek.claims.length} claim)`);

    const half      = Math.ceil(weeks.length / 2);
    const firstHalf = weeks.slice(0, half).reduce((s,w) => s + w.total, 0);
    const secHalf   = weeks.slice(half).reduce((s,w) => s + w.total, 0);
    if (weeks.length >= 2) {
      if      (secHalf > firstHalf * 1.1) insights.push(`📉 Tren: Pengeluaran <b>meningkat</b> di paruh kedua (+${((secHalf-firstHalf)/Math.max(firstHalf,1)*100).toFixed(0)}%)`);
      else if (secHalf < firstHalf * 0.9) insights.push(`📉 Tren: Pengeluaran <b>menurun</b> di paruh kedua (-${((firstHalf-secHalf)/Math.max(firstHalf,1)*100).toFixed(0)}%)`);
      else                                insights.push(`📊 Tren: Pengeluaran <b>stabil</b> sepanjang periode`);
    }
    if (byDriver.length > 1) {
      const avg = grand / byDriver.length;
      const hs  = byDriver.filter(d => d.total > avg * 1.5);
      if (hs.length) insights.push(`⚠️ Driver di atas rata-rata: <b>${hs.map(d=>d.driver).join(", ")}</b>`);
    }

    // ── Cashflow: dana operasional summary ───────────────────
    let cashflowData = null;
    if (kantong) {
      const totalBudget    = kantong.totalBudget    || 0;
      const allocOpDriver  = kantong.allocOpDriver  || 0;
      const allocEmergency = kantong.allocEmergency || 0;
      const cashAvailable  = kantong.cashAvailable  || 0;
      const claimSubmitted = kantong.claimSubmitted || 0;
      const claimPaid      = kantong.claimPaid      || 0;
      const totalAlokasi   = allocOpDriver + allocEmergency;
      const outstanding    = totalAlokasi + cashAvailable + claimSubmitted + claimPaid;

      cashflowData = {
        totalBudget, allocOpDriver, allocEmergency, totalAlokasi,
        cashAvailable, claimSubmitted, claimPaid, outstanding,
        gap: outstanding - totalBudget,
      };
    }

    return {
      monthClaims, weeks, byDriver, byType,
      grand, avgPerWeek, avgPerClaim,
      topDriver, topType, topWeek, insights,
      cashflowData,
      _reportYear: reportYear, _reportMonth: reportMonth,
    };
  };

  const generate = () => { setReport(buildReport()); setGenerated(true); };
  const refresh  = () => { setReport(buildReport()); };

  // ── CSV ───────────────────────────────────────────────────────
  const downloadCSV = () => {
    if (!report || report.empty) return;
    const rows = [["Minggu","Tanggal","Driver","Jenis","Rincian","Nominal","Status"]];
    [...report.monthClaims].sort((a,b) => new Date(a.date)-new Date(b.date)).forEach(c => {
      const items  = getClaimItems(c);
      const driver = getClaimDriver(c);
      const week   = getWeekOfMonth(c.date);
      items.forEach(item => {
        rows.push([
          `Minggu ${week}`, fmtDate(c.date), driver,
          item.type || "", item.expr || "",
          item.total || 0, c.status,
        ]);
      });
    });
    const csv  = rows.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type:"text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `FleetOS_Report_${periodLabel.replace(/\s/g,"_")}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  // ── PDF ───────────────────────────────────────────────────────
  const downloadPDF = () => {
    if (!report || report.empty || downloading) return;
    setDownloading(true);
    try {
    const { monthClaims, weeks, byDriver, byType, grand, avgPerWeek, topDriver, topType, insights, cashflowData, _reportYear, _reportMonth } = report;

    const wkLbl = (w) => weekLabel(w, _reportYear, _reportMonth);

    const weekRows = weeks.map(w => `
      <tr>
        <td>Minggu ${w.week}</td>
        <td style="color:#6b7280;font-size:10px">${filterMode==="month" ? wkLbl(w.week) : ""}</td>
        <td class="num">${w.claims.length}</td>
        <td class="num">${w.drivers} driver</td>
        <td class="num">${w.topType}</td>
        <td class="num bold cyan">Rp ${fmt(w.total)}</td>
        <td class="num">${grand > 0 ? (w.total/grand*100).toFixed(1) : 0}%</td>
      </tr>`).join("");

    const driverRows = byDriver.map((d,i) => `
      <tr>
        <td><span class="rank">${i+1}</span> ${d.driver}</td>
        <td class="num">${d.count}x</td>
        <td class="num">${d.weeks} minggu</td>
        <td class="num">${d.topType}</td>
        <td class="num bold green">Rp ${fmt(d.total)}</td>
        <td class="num">${grand > 0 ? (d.total/grand*100).toFixed(1) : 0}%</td>
      </tr>`).join("");

    const typeRows = byType.map(t => `
      <tr>
        <td>${t.type}</td>
        <td class="num">${t.count}x</td>
        <td class="num bold">Rp ${fmt(t.total)}</td>
        <td class="num">${grand > 0 ? (t.total/grand*100).toFixed(1) : 0}%</td>
      </tr>`).join("");

    const detailRows = [...monthClaims].sort((a,b) => new Date(a.date)-new Date(b.date)).flatMap(c => {
      const items  = getClaimItems(c);
      const driver = getClaimDriver(c);
      return items.map(item => `
        <tr>
          <td>Minggu ${getWeekOfMonth(c.date)}</td>
          <td>${fmtDate(c.date)}</td>
          <td>${driver}</td>
          <td><span class="badge">${item.type || ""}</span></td>
          <td style="font-family:monospace;font-size:9px;color:#64748b">${item.expr || ""}</td>
          <td class="num bold">Rp ${fmt(item.total || 0)}</td>
        </tr>`);
    }).join("");

    const cfSection = cashflowData ? `
      <div class="sec">
        <div class="sec-title">Dana Operasional</div>
        <table>
          <thead><tr><th>Pos</th><th>Nilai</th><th>Keterangan</th></tr></thead>
          <tbody>
            <tr><td>Total Cash Operational (A)</td><td class="num bold cyan">Rp ${fmt(cashflowData.totalBudget)}</td><td>Total dana tersedia</td></tr>
            <tr><td>Op Driver (A1)</td><td class="num">Rp ${fmt(cashflowData.allocOpDriver)}</td><td>Alokasi</td></tr>
            <tr><td>Emergency (A2)</td><td class="num">Rp ${fmt(cashflowData.allocEmergency)}</td><td>Alokasi</td></tr>
            <tr><td>Total Alokasi (A3)</td><td class="num bold">Rp ${fmt(cashflowData.totalAlokasi)}</td><td>A1 + A2</td></tr>
            <tr><td>Cash Available (A4)</td><td class="num">Rp ${fmt(cashflowData.cashAvailable)}</td><td>Kas tersedia</td></tr>
            <tr><td>Claim Diajukan (A5)</td><td class="num">Rp ${fmt(cashflowData.claimSubmitted)}</td><td>Diajukan ke Finance</td></tr>
            <tr><td>Claim Dibayar (A6)</td><td class="num">Rp ${fmt(cashflowData.claimPaid)}</td><td>Sudah dibayar Finance</td></tr>

            React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", marginBottom:5 } },
              React.createElement("span", { style:{ color:"#6B7280" } }, "Outstanding (B):"),
              React.createElement("span", { style:{ fontWeight:700, color:"#00D4FF" } }, `Rp ${fmt(pB)}`)
            ),
            React.createElement("div", { style:{ display:"flex", justifyContent:"space-between", borderTop:"1px solid rgba(255,255,255,0.07)", paddingTop:6, marginTop:2 } },
              React.createElement("span", { style:{ color:"#6B7280" } }, "GAP:"),
              React.createElement("span", { style:{ fontWeight:800, fontSize:14,
                color: pGap===0?"#10B981":pGap>0?"#F59E0B":"#EF4444" } },
                `${pGap>=0?"+":""}Rp ${fmt(pGap)}`
              )
            )
          );
        })(),

        React.createElement("div", { style:{ display:"flex", gap:9, marginTop:16 } },
          React.createElement("button", { className:"btn btn-s", style:{ flex:1 }, onClick:()=>setShowEdit(false) }, "Batal"),
          React.createElement("button", { className:"btn btn-p", style:{ flex:1 }, onClick:saveEdit },
            React.createElement(Icon, { d:IC.check, size:14, stroke:"#0A0E1A" }), "Simpan"
          )
        )
      )
    ),

    // ══════════════════════════════════════════════════════════
    // MODAL: Reset
    // ══════════════════════════════════════════════════════════
    showReset && React.createElement("div", { className:"overlay", onClick:e=>e.target===e.currentTarget&&setShowReset(false) },
      React.createElement("div", { className:"modal", style:{ maxWidth:360, textAlign:"center" } },
        React.createElement("div", { style:{ width:56, height:56, borderRadius:"50%", background:"rgba(239,68,68,0.12)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 14px" } },
          React.createElement(Icon, { d:IC.refresh, size:26, stroke:"#EF4444" })
        ),
        React.createElement("h2", { style:{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:18, marginBottom:8 } }, "Reset Periode?"),
        React.createElement("p", { style:{ fontSize:13, color:"#6B7280", marginBottom:20, lineHeight:1.6 } },
          "Claim Diajukan (A5) dan Claim Dibayar (A6) akan direset ke 0. Total cash dan alokasi tetap sama."
        ),
        React.createElement("div", { style:{ display:"flex", gap:9 } },
          React.createElement("button", { className:"btn btn-s", style:{ flex:1 }, onClick:()=>setShowReset(false) }, "Batal"),
          React.createElement("button", { className:"btn btn-d", style:{ flex:1, justifyContent:"center" }, onClick:doReset },
            React.createElement(Icon, { d:IC.refresh, size:13 }), "Ya, Reset"
          )
        )
      )
    )
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
